function ValDetailModal({ val: initialVal, onClose }) {
  const [v, setV]                 = useState(initialVal);
  const [actionData, setAD]       = useState({});
  const [saving, setSaving]       = useState(false);
  const [aiAnalysis, setAiAnalysis]   = useState(v.ai_findings_analysis || null);
  const [aiApprCheck, setAiApprCheck] = useState(v.ai_approval_check || null);
  const [aiClosure, setAiClosure]     = useState(v.ai_closure_summary ? { summary: v.ai_closure_summary } : null);
  const [aiLoading, setAiLoading]     = useState({ analyze: false, check: false, closure: false });
  const toast = useToast();
  const setA = (k, x) => setAD(p => ({ ...p, [k]: x }));

  async function runAI(type) {
    setAiLoading(p => ({ ...p, [type]: true }));
    try {
      const pathMap = { analyze: 'ai-analyze', check: 'ai-approve-check', closure: 'ai-closure-summary' };
      const r = await apiFetch(`/api/validations/${v.id}/${pathMap[type]}`, { method: 'POST' });
      if (type === 'analyze') setAiAnalysis(r);
      else if (type === 'check') setAiApprCheck(r);
      else setAiClosure(r);
      toast('AI analysis complete', 'success');
    } catch(e) { toast(e.message, 'error'); }
    finally { setAiLoading(p => ({ ...p, [type]: false })); }
  }

  async function doAction(action, extra = {}) {
    setSaving(true);
    try {
      const r = await apiFetch(`/api/validations/${v.id}`, {
        method: 'PUT',
        body: JSON.stringify({ action, ...extra }),
      });
      if (r) setV(r);
      toast('Validation updated', 'success');
    } catch (e) { toast(e.message, 'error'); }
    finally { setSaving(false); }
  }

  return (
    <Modal title="Validation Detail" onClose={onClose} footer={<button className="btn btn-ghost" onClick={onClose}>Close</button>}>
      <WorkflowStates current={v.status} />
      <div className="detail-grid">
        {[
          ['Model',       v.model_name],
          ['Type',        (v.validation_type || '').replace(/_/g, ' ')],
          ['Assigned To', v.assigned_to || '—'],
          ['Due Date',    v.due_date || '—'],
          ['Outcome',     v.outcome || '—'],
        ].map(([l, val]) => (
          <div key={l} className="detail-item">
            <div className="dl">{l}</div>
            <div className="dv">{l === 'Outcome' && v.outcome ? <StatusBadge status={v.outcome} /> : val}</div>
          </div>
        ))}
        <div className="detail-item"><div className="dl">Status</div><div className="dv"><StatusBadge status={v.status} /></div></div>
      </div>
      {v.scope && (
        <div style={{ marginBottom: 14 }}>
          <div className="dl">Scope</div>
          <div style={{ fontSize: 13, marginTop: 3 }}>{v.scope}</div>
        </div>
      )}
      {(v.ai_pre_assessment || v.pre_assessment) && (
        <div className="ai-panel" style={{ marginBottom: 14 }}>
          <div className="ai-panel-hdr"><span className="ai-icon">🧠</span>AI Pre-Assessment</div>
          <div className="ai-insight">{v.ai_pre_assessment || v.pre_assessment}</div>
        </div>
      )}
      {v.findings && (
        <div style={{ marginBottom: 14 }}>
          <div className="dl">Findings</div>
          <div style={{ fontSize: 13, marginTop: 3, whiteSpace: 'pre-wrap' }}>{v.findings}</div>
        </div>
      )}

      {/* Phase 7: Backtesting Log */}
      <BacktestingLog validationId={v.id} />

      {/* AI: Findings Analysis */}
      {(v.findings || aiAnalysis) && (
        <div style={{ marginBottom: 14 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
            <span style={{ fontSize: 12.5, fontWeight: 700, color: 'var(--navy)' }}>AI Findings Analyzer</span>
            <button className="btn btn-ai btn-sm" onClick={() => runAI('analyze')} disabled={aiLoading.analyze}>
              {aiLoading.analyze ? <><Spinner /> Analyzing…</> : aiAnalysis ? '↻ Re-analyze' : '🔍 Analyze Findings'}
            </button>
          </div>
          {aiAnalysis && (
            <div className="ai-analysis-panel">
              <div className="ai-analysis-hdr">
                <span className="ai-icon">🧠</span>
                <span className="ai-analysis-hdr-title">OSFI E-23 Findings Analysis</span>
                <span className={`badge badge-${aiAnalysis.severity === 'critical' || aiAnalysis.severity === 'high' ? 'red' : aiAnalysis.severity === 'medium' ? 'amber' : 'green'}`} style={{ textTransform: 'capitalize' }}>{aiAnalysis.severity}</span>
              </div>
              <div className="ai-analysis-body">
                <div className="ai-meta-row">
                  <span className="ai-score-chip">Completeness: {aiAnalysis.findings_completeness_score}%</span>
                  <span className={`badge badge-${aiAnalysis.approval_recommendation === 'approve' ? 'green' : aiAnalysis.approval_recommendation === 'reject' ? 'red' : 'amber'}`}>{(aiAnalysis.approval_recommendation || '').replace(/_/g, ' ')}</span>
                  {aiAnalysis.remediation_timeline && <span style={{ fontSize: 12, color: 'var(--text-muted)' }}>Remediation: {aiAnalysis.remediation_timeline}</span>}
                </div>
                {aiAnalysis.approval_rationale && <div style={{ fontSize: 13, color: '#1e3a8a', marginBottom: 10, lineHeight: 1.6 }}>{aiAnalysis.approval_rationale}</div>}
                {aiAnalysis.osfi_sections_implicated?.length > 0 && (
                  <div className="ai-section">
                    <div className="ai-section-label">OSFI Sections Implicated</div>
                    <ul className="ai-item-list">{aiAnalysis.osfi_sections_implicated.map((s, i) => <li key={i}>{s}</li>)}</ul>
                  </div>
                )}
                {aiAnalysis.gaps_in_findings?.length > 0 && (
                  <div className="ai-section">
                    <div className="ai-section-label">Gaps in Findings</div>
                    <ul className="ai-item-list">{aiAnalysis.gaps_in_findings.map((g, i) => <li key={i}>{g}</li>)}</ul>
                  </div>
                )}
                {aiAnalysis.recommended_conditions?.length > 0 && (
                  <div className="ai-section">
                    <div className="ai-section-label">Recommended Conditions</div>
                    <ul className="ai-item-list">{aiAnalysis.recommended_conditions.map((c, i) => <li key={i}>{c}</li>)}</ul>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      )}

      {/* AI: Approval Readiness Check */}
      {(v.status === 'findings_submitted' || aiApprCheck) && (
        <div style={{ marginBottom: 14 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
            <span style={{ fontSize: 12.5, fontWeight: 700, color: 'var(--navy)' }}>AI Approval Check</span>
            <button className="btn btn-ai btn-sm" onClick={() => runAI('check')} disabled={aiLoading.check}>
              {aiLoading.check ? <><Spinner /> Checking…</> : aiApprCheck ? '↻ Re-check' : '✅ Check Approval Readiness'}
            </button>
          </div>
          {aiApprCheck && (
            <div className="ai-analysis-panel">
              <div className="ai-analysis-hdr">
                <span className="ai-icon">🧠</span>
                <span className="ai-analysis-hdr-title">Approval Readiness Check</span>
                <span className={`badge badge-${aiApprCheck.approval_ready ? 'green' : 'red'}`}>{aiApprCheck.approval_ready ? 'Ready to Approve' : 'Not Ready'}</span>
                <span className="ai-score-chip" style={{ marginLeft: 6 }}>Completeness: {aiApprCheck.completeness_score}%</span>
              </div>
              <div className="ai-analysis-body">
                {aiApprCheck.recommendation && <div style={{ fontSize: 13, color: '#1e3a8a', marginBottom: 10, lineHeight: 1.6 }}>{aiApprCheck.recommendation}</div>}
                {aiApprCheck.osfi_e23_requirements_met?.length > 0 && (
                  <div className="ai-section">
                    <div className="ai-section-label" style={{ color: 'var(--green)' }}>Requirements Met</div>
                    <ul className="ai-item-list">{aiApprCheck.osfi_e23_requirements_met.map((r, i) => <li key={i} style={{ color: 'var(--green)' }}>{r}</li>)}</ul>
                  </div>
                )}
                {aiApprCheck.osfi_e23_requirements_missing?.length > 0 && (
                  <div className="ai-section">
                    <div className="ai-section-label" style={{ color: 'var(--red)' }}>Requirements Missing</div>
                    <ul className="ai-item-list">{aiApprCheck.osfi_e23_requirements_missing.map((r, i) => <li key={i} style={{ color: 'var(--red)' }}>{r}</li>)}</ul>
                  </div>
                )}
                {aiApprCheck.missing_documentation?.length > 0 && (
                  <div className="ai-section">
                    <div className="ai-section-label">Missing Documentation</div>
                    <ul className="ai-item-list">{aiApprCheck.missing_documentation.map((d, i) => <li key={i}>{d}</li>)}</ul>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      )}

      {/* AI: Closure Summary */}
      {(v.status === 'approved' || v.status === 'closed' || aiClosure) && (
        <div style={{ marginBottom: 14 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
            <span style={{ fontSize: 12.5, fontWeight: 700, color: 'var(--navy)' }}>AI Audit Closure Summary</span>
            <button className="btn btn-ai btn-sm" onClick={() => runAI('closure')} disabled={aiLoading.closure}>
              {aiLoading.closure ? <><Spinner /> Generating…</> : aiClosure ? '↻ Regenerate' : '📝 Generate Closure Narrative'}
            </button>
          </div>
          {aiClosure && (
            <div className="ai-panel">
              <div className="ai-panel-hdr"><span className="ai-icon">🧠</span>Audit Closure Narrative (OSFI E-23 §4.4)</div>
              <div className="ai-insight">{aiClosure.summary || aiClosure}</div>
            </div>
          )}
        </div>
      )}

      {/* Action areas */}
      {v.status === 'requested' && (
        <div style={{ background: 'var(--bg)', borderRadius: 8, padding: 16, marginTop: 12 }}>
          <div style={{ fontWeight: 700, marginBottom: 10 }}>Assign Validator</div>
          <div style={{ display: 'flex', gap: 8 }}>
            <input className="form-control" type="email" placeholder="validator@institution.ca" value={actionData.email || ''} onChange={e => setA('email', e.target.value)} />
            <button className="btn btn-primary" onClick={() => doAction('assign', { assigned_to_email: actionData.email })} disabled={saving || !actionData.email}>
              {saving ? <Spinner /> : 'Assign'}
            </button>
          </div>
        </div>
      )}
      {v.status === 'assigned' && (
        <div style={{ marginTop: 12 }}>
          <button className="btn btn-primary" onClick={() => doAction('start')} disabled={saving}>
            {saving ? <Spinner /> : 'Start Validation'}
          </button>
        </div>
      )}
      {v.status === 'in_progress' && (
        <div style={{ background: 'var(--bg)', borderRadius: 8, padding: 16, marginTop: 12 }}>
          <div style={{ fontWeight: 700, marginBottom: 12 }}>Submit Findings</div>
          <div className="form-group" style={{ marginBottom: 12 }}>
            <label className="form-label">Findings</label>
            <textarea className="form-control" rows={4} value={actionData.findings || ''} onChange={e => setA('findings', e.target.value)} placeholder="Describe findings from the validation…" />
          </div>
          <div className="form-group" style={{ marginBottom: 12 }}>
            <label className="form-label">Outcome</label>
            <div style={{ display: 'flex', gap: 20, marginTop: 4 }}>
              {['pass', 'conditional_pass', 'fail'].map(o => (
                <label key={o} style={{ display: 'flex', alignItems: 'center', gap: 6, cursor: 'pointer', fontSize: 13.5 }}>
                  <input type="radio" name="outcome_sel" value={o} checked={actionData.outcome === o} onChange={() => setA('outcome', o)} />
                  {o.replace(/_/g, ' ')}
                </label>
              ))}
            </div>
          </div>
          {(actionData.outcome === 'conditional_pass' || actionData.outcome === 'fail') && (
            <div className="form-group" style={{ marginBottom: 12 }}>
              <label className="form-label">Conditions / Remediation Required</label>
              <textarea className="form-control" rows={3} value={actionData.conditions || ''} onChange={e => setA('conditions', e.target.value)} placeholder="Specify required conditions or remediation actions…" />
            </div>
          )}
          <button className="btn btn-primary" disabled={saving || !actionData.findings || !actionData.outcome} onClick={() => doAction('submit', { findings: actionData.findings, outcome: actionData.outcome, conditions: actionData.conditions })}>
            {saving ? <Spinner /> : 'Submit Findings'}
          </button>
        </div>
      )}
      {v.status === 'findings_submitted' && (
        <div style={{ marginTop: 12 }}>
          <button className="btn btn-success" onClick={() => doAction('approve')} disabled={saving}>
            {saving ? <Spinner /> : '✓ Approve Validation'}
          </button>
        </div>
      )}
      {v.status === 'approved' && (
        <div style={{ marginTop: 12 }}>
          <button className="btn btn-ghost" onClick={() => doAction('close')} disabled={saving}>
            {saving ? <Spinner /> : 'Close Validation'}
          </button>
        </div>
      )}
    </Modal>
  );
}

/* ═══════════════════════════════════════════════════
   VENDOR ASSESSMENTS
═══════════════════════════════════════════════════ */
const VENDOR_CHECKS = [
  { key: 'q_sla_documented',     label: 'SLA is formally documented' },
  { key: 'q_data_access',        label: 'Data access and usage rights are documented' },
  { key: 'q_audit_rights',       label: 'Contractual audit rights over the vendor exist' },
  { key: 'q_exit_plan',          label: 'Exit / transition plan is documented' },
  { key: 'q_concentration_risk', label: 'Concentration risk has been assessed' },
  { key: 'q_model_doc_received', label: 'Model documentation (methodology, assumptions) received from vendor' },
  { key: 'q_override_capability',label: 'Override capability exists (we can override model outputs)' },
];

function VendorAssessments() {
  const [list, setList]     = useState([]);
  const [models, setModels] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showCreate, setShowCreate] = useState(false);
  const [selected, setSelected]     = useState(null);
  const toast = useToast();

  function load() {
    setLoading(true);
    Promise.all([apiFetch('/api/vendor-assessments'), apiFetch('/api/models')])
      .then(([a, m]) => { setList(a || []); setModels((m || []).filter(x => x.is_third_party)); })
      .catch(e => toast(e.message, 'error'))
      .finally(() => setLoading(false));
  }
  useEffect(() => { load(); }, []);

  return (
    <div>
      <div className="section-hdr">
        <div className="section-title">Vendor Assessments</div>
        <button className="btn btn-primary" onClick={() => setShowCreate(true)}>+ New Assessment</button>
      </div>
      <div className="card">
        {loading ? (
          <div className="spinner-center"><Spinner dark size={26} /></div>
        ) : list.length === 0 ? (
          <div className="empty-state"><div className="empty-icon">🏢</div>No vendor assessments yet.</div>
        ) : (
          <div className="table-wrap">
            <table>
              <thead><tr><th>Model</th><th>Vendor</th><th>Risk Level</th><th>Assessed By</th><th>Next Review</th></tr></thead>
              <tbody>
                {list.map(a => (
                  <tr key={a.id} style={{ cursor: 'pointer' }} onClick={() => setSelected(a)}>
                    <td><strong>{a.model_name}</strong></td>
                    <td>{a.vendor_name}</td>
                    <td><StatusBadge status={a.risk_level} /></td>
                    <td>{a.assessed_by}</td>
                    <td style={{ fontSize: 13 }}>{a.next_review_due || '—'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
      {showCreate && <CreateVendorModal models={models} onClose={() => setShowCreate(false)} onCreated={() => { setShowCreate(false); load(); }} />}
      {selected && <VendorDetailModal a={selected} onClose={() => setSelected(null)} />}
    </div>
  );
}

function CreateVendorModal({ models, onClose, onCreated }) {
  const initChecks = Object.fromEntries(VENDOR_CHECKS.map(c => [c.key, false]));
  const [checks, setChecks] = useState(initChecks);
  const [form, setForm]     = useState({ model_id: '', findings: '' });
  const [saving, setSaving] = useState(false);
  const [aiResult, setAiResult] = useState(null);
  const toast = useToast();

  async function handleSubmit(e) {
    e.preventDefault(); setSaving(true);
    try {
      const r = await apiFetch('/api/vendor-assessments', { method: 'POST', body: JSON.stringify({ ...form, ...checks }) });
      if (r?.ai_assessment) { setAiResult(r.ai_assessment); }
      else { toast('Assessment created', 'success'); onCreated(); }
    } catch (e) { toast(e.message, 'error'); setSaving(false); }
  }

  if (aiResult) return (
    <Modal title="Assessment Created" onClose={onCreated} footer={<button className="btn btn-primary" onClick={onCreated}>Done</button>}>
      <div className="alert alert-success">Vendor assessment submitted successfully.</div>
      <div className="ai-panel">
        <div className="ai-panel-hdr"><span className="ai-icon">🧠</span>AI Vendor Risk Assessment</div>
        <div className="ai-insight">{aiResult}</div>
      </div>
    </Modal>
  );

  return (
    <Modal title="New Vendor Assessment" onClose={onClose}
      footer={
        <>
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" form="va-form" type="submit" disabled={saving}>
            {saving ? <><Spinner /> Submitting…</> : 'Submit Assessment'}
          </button>
        </>
      }>
      <form id="va-form" onSubmit={handleSubmit}>
        <div className="form-group" style={{ marginBottom: 16 }}>
          <label className="form-label">Model *</label>
          <select className="form-control" value={form.model_id} onChange={e => setForm(p => ({ ...p, model_id: e.target.value }))} required>
            <option value="">Select a model…</option>
            {models.map(m => <option key={m.id} value={m.id}>{m.name} — {m.vendor_name}</option>)}
          </select>
          <div style={{ fontSize: 11.5, color: 'var(--text-muted)', marginTop: 4 }}>Only vendor/third-party models are shown.</div>
        </div>
        <div style={{ marginBottom: 16 }}>
          <div className="form-label" style={{ marginBottom: 8 }}>Due Diligence Checklist</div>
          <div className="vendor-cb-list">
            {VENDOR_CHECKS.map(c => (
              <div key={c.key} className="vendor-cb">
                <input type="checkbox" id={c.key} checked={!!checks[c.key]} onChange={e => setChecks(p => ({ ...p, [c.key]: e.target.checked }))} />
                <label htmlFor={c.key}>{c.label}</label>
              </div>
            ))}
          </div>
        </div>
        <div className="form-group">
          <label className="form-label">Findings</label>
          <textarea className="form-control" rows={4} value={form.findings} onChange={e => setForm(p => ({ ...p, findings: e.target.value }))} placeholder="Summarise your assessment findings and observations…" />
        </div>
      </form>
    </Modal>
  );
}

function VendorDetailModal({ a: initialA, onClose }) {
  const [a, setA] = useState(initialA);
  const [deepdive, setDeepdive] = useState(a.ai_deepdive || null);
  const [ddLoading, setDdLoading] = useState(false);
  const toast = useToast();

  async function runDeepdive() {
    setDdLoading(true);
    try {
      const r = await apiFetch(`/api/vendor-assessments/${a.id}/ai-deepdive`, { method: 'POST' });
      setDeepdive(r);
      toast('AI deep dive complete', 'success');
    } catch(e) { toast(e.message, 'error'); }
    finally { setDdLoading(false); }
  }

  const trendColor = { improving: 'var(--green)', deteriorating: 'var(--red)', stable: 'var(--amber)', first_assessment: 'var(--grey)' };

  return (
    <Modal title="Vendor Assessment Detail" onClose={onClose} footer={<button className="btn btn-ghost" onClick={onClose}>Close</button>}>
      <div style={{ display: 'flex', justifyContent: 'flex-end', marginBottom: 12 }}>
        <button className="btn btn-ai btn-sm" onClick={runDeepdive} disabled={ddLoading}>
          {ddLoading ? <><Spinner /> Analysing…</> : deepdive ? '↻ Refresh Deep Dive' : '🔬 AI OSFI §5 Deep Dive'}
        </button>
      </div>
      <div className="detail-grid">
        {[
          ['Model',       a.model_name],
          ['Vendor',      a.vendor_name],
          ['Assessed By', a.assessed_by_email || a.assessed_by],
          ['Next Review', a.next_review_due || '—'],
        ].map(([l, v]) => (
          <div key={l} className="detail-item"><div className="dl">{l}</div><div className="dv">{v}</div></div>
        ))}
        <div className="detail-item"><div className="dl">Risk Level</div><div className="dv"><StatusBadge status={a.risk_level} /></div></div>
        <div className="detail-item"><div className="dl">Score</div><div className="dv">{a.risk_score}/12</div></div>
      </div>
      <div style={{ marginBottom: 14 }}>
        <div className="dl" style={{ marginBottom: 8 }}>OSFI §5 Due Diligence Checklist</div>
        <div className="vendor-cb-list">
          {VENDOR_CHECKS.map(c => (
            <div key={c.key} className="vendor-cb">
              <span style={{ fontSize: 15 }}>{a[c.key] ? '✅' : '❌'}</span>
              <label style={{ color: a[c.key] ? 'var(--text)' : 'var(--grey)' }}>{c.label}</label>
            </div>
          ))}
        </div>
      </div>
      {a.findings && (
        <div style={{ marginBottom: 14 }}>
          <div className="dl">Findings</div>
          <div style={{ fontSize: 13, marginTop: 4, whiteSpace: 'pre-wrap' }}>{a.findings}</div>
        </div>
      )}
      {a.ai_assessment && (
        <div className="ai-panel" style={{ marginBottom: 14 }}>
          <div className="ai-panel-hdr"><span className="ai-icon">🧠</span>AI Risk Assessment (Initial)</div>
          <div className="ai-insight">{a.ai_assessment}</div>
        </div>
      )}
      {deepdive && (
        <div className="ai-analysis-panel">
          <div className="ai-analysis-hdr">
            <span className="ai-icon">🔬</span>
            <span className="ai-analysis-hdr-title">OSFI §5 Deep Dive Analysis</span>
            <span className="ai-score-chip">§5 Score: {deepdive.osfi_section5_compliance_score}%</span>
          </div>
          <div className="ai-analysis-body">
            <div className="ai-meta-row">
              {deepdive.trend && <span style={{ fontSize: 12, fontWeight: 700, color: trendColor[deepdive.trend] || 'var(--grey)' }}>Trend: {deepdive.trend.replace(/_/g, ' ')}</span>}
              {deepdive.next_assessment_priority && <span className={`badge badge-${deepdive.next_assessment_priority === 'high' ? 'red' : deepdive.next_assessment_priority === 'medium' ? 'amber' : 'green'}`}>Re-assess Priority: {deepdive.next_assessment_priority}</span>}
              {deepdive.regulatory_disclosure_required && <span className="badge badge-red">Regulatory Disclosure Required</span>}
            </div>
            {deepdive.concentration_risk_narrative && (
              <div className="ai-section">
                <div className="ai-section-label">Concentration Risk</div>
                <div style={{ fontSize: 13, color: '#1e3a8a', lineHeight: 1.6 }}>{deepdive.concentration_risk_narrative}</div>
              </div>
            )}
            {deepdive.critical_gaps?.length > 0 && (
              <div className="ai-section">
                <div className="ai-section-label" style={{ color: 'var(--red)' }}>Critical Gaps</div>
                <ul className="ai-item-list">{deepdive.critical_gaps.map((g, i) => <li key={i} style={{ color: 'var(--red)' }}>{g}</li>)}</ul>
              </div>
            )}
            {deepdive.remediation_plan?.length > 0 && (
              <div className="ai-section">
                <div className="ai-section-label">Remediation Plan</div>
                {deepdive.remediation_plan.map((item, i) => (
                  <div key={i} className="remediation-item">
                    <div className="remediation-action">{item.action}</div>
                    <div className="remediation-meta">
                      <span>Owner: <strong>{item.owner}</strong></span>
                      <span>Timeline: <strong>{item.timeline}</strong></span>
                      {item.osfi_ref && <span>Reference: <strong>{item.osfi_ref}</strong></span>}

                ))}

            {deepdive.regulatory_disclosure_rationale && (
              <div style={{ fontSize: 12, color: 'var(--text-muted)', marginTop: 8, fontStyle: 'italic' }}>{deepdive.regulatory_disclosure_rationale}</div>
            )}
            {deepdive.next_assessment_rationale && (
              <div style={{ fontSize: 12, color: 'var(--text-muted)', marginTop: 4 }}>Next assessment: {deepdive.next_assessment_rationale}</div>
            )}
          </div>
        </div>
      )}
    </Modal>
  );
}

/* ═══════════════════════════════════════════════════
   AUDIT TRAIL
═══════════════════════════════════════════════════ */
function AuditTrail() {
  const [events, setEvents] = useState([]);
  const [loading, setLoading] = useState(true);
  const [integrity, setIntegrity] = useState(null);
  const [intLoading, setIntLoading] = useState(false);
  const toast = useToast();

  useEffect(() => {
    apiFetch('/api/audit')
      .then(setEvents)
      .catch(e => toast(e.message, 'error'))
      .finally(() => setLoading(false));
  }, []);

  async function verifyIntegrity() {
    setIntLoading(true);
    try {
      const r = await apiFetch('/api/audit/verify-integrity');
      setIntegrity(r);
    } catch(e) { toast(e.message, 'error'); }
    finally { setIntLoading(false); }
  }

  function copyHash(h) { navigator.clipboard?.writeText(h).then(() => toast('Hash copied', 'success')); }

  return (
    <div>
      {/* Integrity Panel */}
      <div className="card" style={{ marginBottom:18 }}>
        <div className="section-hdr" style={{ marginBottom: integrity ? 14 : 0 }}>
          <div>
            <div className="section-title">Cryptographic Integrity</div>
            <div style={{ fontSize:12, color:'var(--text-muted)', marginTop:2 }}>Merkle hash chain — every event links to the previous. Any tampering breaks the chain.</div>
          </div>
          <div style={{ display:'flex', gap:10, alignItems:'center' }}>
            {integrity && (
              <span className={`integrity-badge ${integrity.valid ? 'integrity-valid' : 'integrity-invalid'}`}>
                {integrity.valid ? '✓ Chain Intact' : '✗ Breach Detected'}
              </span>
            )}
            <button className="btn btn-outline btn-sm" onClick={verifyIntegrity} disabled={intLoading}>
              {intLoading ? <><Spinner dark /> Verifying…</> : '🔐 Verify Integrity'}
            </button>
          </div>
        </div>
        {integrity && (
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))', gap:10 }}>
            {[
              ['Verified Events', integrity.total_verified, '#15803d'],
              ['Legacy Events', integrity.total_legacy, '#64748b'],
              ['Merkle Root', null, null, integrity.merkle_root],
              ['Chain Tip', null, null, integrity.chain_tip],
            ].map(([label, val, color, hash], i) => (
              <div key={i} style={{ background:'#f8fafc', borderRadius:8, padding:'10px 14px', border:'1px solid var(--border)' }}>
                <div style={{ fontSize:11, color:'var(--text-muted)', fontWeight:700, textTransform:'uppercase', letterSpacing:'.5px', marginBottom:4 }}>{label}</div>
                {hash
                  ? <span className="hash-pill" title={hash} onClick={() => copyHash(hash)}>{hash}</span>
                  : <div style={{ fontSize:18, fontWeight:800, color:color||'var(--navy)' }}>{val}</div>
                }
              </div>
            ))}
          </div>
        )}
        {integrity && !integrity.valid && integrity.first_breach && (
          <div className="alert-banner" style={{ marginTop:12 }}>
            Chain breach at sequence #{integrity.first_breach.seq} · Event: {integrity.first_breach.event_type} · Timestamp: {integrity.first_breach.created_at}
          </div>
        )}
        {!integrity && (
          <div style={{ fontSize:13, color:'var(--text-muted)' }}>
            Click <strong>Verify Integrity</strong> to run a cryptographic check. Each audit event is linked by a SHA-256 hash chain. Any manual database manipulation would break the chain and be immediately detectable — providing OSFI examiners with mathematical proof of data integrity.
          </div>
        )}
      </div>

      {/* Events Table */}
      <div className="card">
        <div className="section-hdr" style={{ marginBottom:14 }}>
          <div className="section-title">Audit Events</div>
          <div style={{ fontSize:12, color:'var(--text-muted)' }}>Append-only · Immutable DB trigger · Hash-chained</div>
        </div>
        {loading ? (
          <div className="spinner-center"><Spinner dark size={26} /></div>
        ) : events.length === 0 ? (
          <div className="empty-state"><div className="empty-icon">📋</div>No audit events recorded yet.</div>
        ) : (
          <div className="table-wrap">
            <table>
              <thead>
                <tr><th>Timestamp</th><th>Event</th><th>Model</th><th>Actor</th><th>Hash</th></tr>
              </thead>
              <tbody>
                {events.map((e, i) => (
                  <tr key={i}>
                    <td style={{ fontSize:12, whiteSpace:'nowrap', color:'var(--text-muted)' }}>{e.created_at || e.timestamp}</td>
                    <td><span style={{ fontSize:12.5, fontWeight:600 }}>{(e.event_type||e.description||e.action||'').replace(/_/g,' ')}</span></td>
                    <td style={{ fontSize:13 }}>{e.model_name || '—'}</td>
                    <td style={{ fontSize:12 }}>{e.actor_email || e.performed_by || e.user_email || ''}</td>
                    <td>
                      {e.event_hash
                        ? <span className="hash-pill" title={e.event_hash} onClick={() => copyHash(e.event_hash)}>#{e.chain_seq} · {e.event_hash.substring(0,14)}…</span>
                        : <span style={{ fontSize:11, color:'var(--text-muted)' }}>legacy</span>
                      }
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   CSV IMPORT
═══════════════════════════════════════════════════ */
function CsvImport() {
  const [file, setFile]   = useState(null);
  const [drag, setDrag]   = useState(false);
  const [loading, setLoading] = useState(false);
  const [result, setResult]   = useState(null);
  const fileRef = useRef();
  const toast = useToast();

  function handleFile(f) {
    if (!f) return;
    if (!f.name.toLowerCase().endsWith('.csv')) { toast('Please select a .csv file', 'error'); return; }
    setFile(f); setResult(null);
  }

  async function handleUpload() {
    if (!file) return;
    setLoading(true);
    try {
      const fd = new FormData();
      fd.append('file', file);
      const token = getToken();
      const res = await fetch('/api/models/import', {
        method: 'POST',
        headers: { ...(token ? { Authorization: `Bearer ${token}` } : {}) },
        body: fd,
      });
      if (res.status === 401 || res.status === 403) { clearToken(); window.location.reload(); return; }
      if (!res.ok) { const e = await res.json().catch(() => ({ message: `HTTP ${res.status}` })); throw new Error(e.message); }
      const r = await res.json();
      setResult(r);
      setFile(null);
      toast(`Imported ${r.imported} model(s)`, 'success');
    } catch (e) { toast(e.message, 'error'); }
    finally { setLoading(false); }
  }

  return (
    <div>
      <div className="section-title" style={{ marginBottom: 16 }}>Import Models from CSV</div>
      <div className="card" style={{ maxWidth: 560 }}>
        <div
          className={`import-zone${drag ? ' drag-over' : ''}`}
          onClick={() => fileRef.current.click()}
          onDragOver={e => { e.preventDefault(); setDrag(true); }}
          onDragLeave={() => setDrag(false)}
          onDrop={e => { e.preventDefault(); setDrag(false); handleFile(e.dataTransfer.files[0]); }}>
          <div className="import-icon">📥</div>
          <div style={{ fontWeight: 600, fontSize: 15 }}>
            {file ? file.name : 'Drop a CSV file here, or click to browse'}
          </div>
          <div className="import-hint">
            Supported columns: name, version, business_unit, model_owner_name, methodology_type, is_third_party, vendor_name
          </div>
          <input ref={fileRef} type="file" accept=".csv" style={{ display: 'none' }} onChange={e => handleFile(e.target.files[0])} />
        </div>
        {file && (
          <div style={{ marginTop: 14 }}>
            <button className="btn btn-primary" onClick={handleUpload} disabled={loading}>
              {loading ? <><Spinner /> Importing…</> : `Import ${file.name}`}
            </button>
          </div>
        )}
        {result && (
          <div style={{ marginTop: 16 }}>
            <div className="alert alert-success">✓ Imported <strong>{result.imported}</strong> model(s) successfully.</div>
            {result.skipped > 0 && <div className="alert alert-warning">⚠️ {result.skipped} row(s) skipped (duplicates or invalid data).</div>}
            {result.errors?.length > 0 && (
              <div className="alert alert-danger">
                <strong>Errors encountered:</strong>
                <ul style={{ marginTop: 6, paddingLeft: 16 }}>
                  {result.errors.map((err, i) => <li key={i} style={{ fontSize: 13 }}>{err}</li>)}
                </ul>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function AdminPanel({ user }) {
  const [activeTab, setActiveTab] = useState('users');
  const [tenants, setTenants] = useState([]);
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showAddUser, setShowAddUser] = useState(false);
  const [ssoForm, setSsoForm] = useState({ sso_enabled: false, sso_provider_name: '', sso_metadata_url: '' });
  const [ssoSaving, setSsoSaving] = useState(false);
  const [addUserForm, setAddUserForm] = useState({ email: '', full_name: '', role: 'analyst', temp_password: '' });
  const [addUserSaving, setAddUserSaving] = useState(false);
  const toast = useToast();

  const tenantId = user?.tenant_id || '';

  async function loadData() {
    setLoading(true);
    try {
      const [t, u] = await Promise.all([
        apiFetch('/api/admin/tenants'),
        apiFetch(`/api/admin/tenants/${tenantId}/users`),
      ]);
      setTenants(t || []);
      setUsers(u || []);
      const myTenant = (t || []).find(x => x.id === tenantId);
      if (myTenant) setSsoForm({ sso_enabled: myTenant.sso_enabled || false, sso_provider_name: myTenant.sso_provider_name || '', sso_metadata_url: myTenant.sso_metadata_url || '' });
    } catch(e) { toast(e.message, 'error'); }
    finally { setLoading(false); }
  }
  useEffect(() => { loadData(); }, []);

  async function handleAddUser(e) {
    e.preventDefault(); setAddUserSaving(true);
    try {
      await apiFetch(`/api/admin/tenants/${tenantId}/users`, { method: 'POST', body: JSON.stringify(addUserForm) });
      toast('User provisioned successfully', 'success');
      setShowAddUser(false);
      setAddUserForm({ email: '', full_name: '', role: 'analyst', temp_password: '' });
      loadData();
    } catch(e) { toast(e.message, 'error'); }
    finally { setAddUserSaving(false); }
  }

  async function saveSSO(e) {
    e.preventDefault(); setSsoSaving(true);
    try {
      await apiFetch(`/api/admin/tenants/${tenantId}/sso`, { method: 'PUT', body: JSON.stringify(ssoForm) });
      toast('SSO configuration saved', 'success');
      loadData();
    } catch(e) { toast(e.message, 'error'); }

            <form onSubmit={saveSSO}>

              {ssoForm.sso_enabled && (
                <>
                  <div className="form-group" style={{ marginBottom: 14 }}>
                    <label className="form-label">Identity Provider Name *</label>
                    <input className="form-control" value={ssoForm.sso_provider_name} onChange={e => setSsoForm(p => ({ ...p, sso_provider_name: e.target.value }))} placeholder="e.g. AzureAD-YourInstitution" required={ssoForm.sso_enabled} />
                    <div style={{ fontSize: 11.5, color: 'var(--text-muted)', marginTop: 4 }}>Alphanumeric + hyphens only. Must match the provider name registered in AWS Cognito.</div>
                  </div>
                  <div className="form-group" style={{ marginBottom: 18 }}>
                    <label className="form-label">SAML Metadata URL *</label>
                    <input className="form-control" value={ssoForm.sso_metadata_url} onChange={e => setSsoForm(p => ({ ...p, sso_metadata_url: e.target.value }))} placeholder="https://login.microsoftonline.com/{tenant}/federationmetadata/2007-06/federationmetadata.xml" required={ssoForm.sso_enabled} />
                    <div style={{ fontSize: 11.5, color: 'var(--text-muted)', marginTop: 4 }}>Azure AD: Settings → Single Sign-On → Metadata URL. Okta: Identity Provider metadata URL.</div>
                  </div>
                  <div className="card" style={{ background: 'var(--bg)', marginBottom: 18 }}>
                    <div style={{ fontWeight: 700, marginBottom: 8, fontSize: 13 }}>Configure your IdP with these ClearMRM SAML values:</div>
                    <div style={{ fontSize: 12.5, lineHeight: 2.2, fontFamily: 'monospace', color: 'var(--text)' }}>
                      <div><strong>Entity ID (Audience URI):</strong> urn:amazon:cognito:sp:ca-central-1_72aIikL9T</div>
                      <div><strong>ACS URL (Reply URL):</strong> https://clearmrm.auth.ca-central-1.amazoncognito.com/saml2/idpresponse</div>
                      <div><strong>Attribute Mapping (email):</strong> http://schemas.xmlsoap.org/ws/2005/05/identity/claims/emailaddress</div>
                    </div>
                  </div>
                </>
              )}
              <button type="submit" className="btn btn-primary" disabled={ssoSaving}>
                {ssoSaving ? <><Spinner /> Saving…</> : 'Save SSO Configuration'}
              </button>
            </form>
          </div>
        </div>
      )}

      {activeTab === 'tenants' && (
        <div>
          <div className="section-title" style={{ marginBottom: 16 }}>All Tenants ({tenants.length})</div>
          <div className="card">
            <div className="table-wrap">
              <table>
                <thead><tr><th>Institution</th><th>Type</th><th>Domain</th><th>Users</th><th>Models</th><th>SSO</th><th>Status</th></tr></thead>
                <tbody>
                  {tenants.map(t => (
                    <tr key={t.id}>
                      <td><strong>{t.name}</strong></td>
                      <td style={{ fontSize: 12 }}>{(t.institution_type || '—').replace(/_/g, ' ')}</td>
                      <td style={{ fontSize: 12, color: 'var(--text-muted)' }}>{t.domain || '—'}</td>
                      <td>{t.user_count || 0}</td>
                      <td>{t.model_count || 0}</td>

              </table>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   MODEL MONITORING SECTION (in ModelDetail)
═══════════════════════════════════════════════════ */
function ModelMonitoringSection({ modelId }) {
  const [entries, setEntries]   = useState([]);
  const [loading, setLoading]   = useState(true);
  const [showForm, setShowForm] = useState(false);
  const [form, setForm]         = useState({ metric_name:'', metric_value:'', threshold_amber:'', threshold_red:'', notes:'', logged_at:'' });
  const [saving, setSaving]     = useState(false);
  const [aiAnalysis, setAiAnalysis]   = useState({});
  const [aiLoading, setAiLoading]     = useState({});
  const toast = useToast();

  const COMMON_METRICS = ['PSI','Gini','KS Statistic','Accuracy','F1 Score','AUC-ROC','Default Rate','Override Rate','Custom'];

  function load() {
    setLoading(true);
    apiFetch(`/api/models/${modelId}/monitoring`)
      .then(setEntries).catch(e => toast(e.message,'error')).finally(() => setLoading(false));
  }
  useEffect(() => { load(); }, [modelId]);

  async function submit() {
    if (!form.metric_name.trim() || form.metric_value === '')
      return toast('Metric name and value are required','error');
    setSaving(true);
    try {
      const r = await apiFetch(`/api/models/${modelId}/monitoring`,{ method:'POST', body:JSON.stringify(form) });
      toast(r.threshold_breached ? '⚠️ Red threshold breached — audit event logged' : 'Metric logged','success');
      setShowForm(false);
      setForm({ metric_name:'', metric_value:'', threshold_amber:'', threshold_red:'', notes:'', logged_at:'' });
      load();
    } catch(e) { toast(e.message,'error'); }
    finally { setSaving(false); }
  }

  function metricClass(e) {
    if (e.threshold_red   && parseFloat(e.metric_value) >= parseFloat(e.threshold_red))   return 'metric-red';
    if (e.threshold_amber && parseFloat(e.metric_value) >= parseFloat(e.threshold_amber)) return 'metric-amber';
    return e.threshold_amber || e.threshold_red ? 'metric-ok' : 'metric-neutral';
  }

  async function runAIAnalysis(metricName) {
    setAiLoading(p => ({...p,[metricName]:true}));
    try {
      const r = await apiFetch(`/api/models/${modelId}/monitoring/ai-analysis`,{ method:'POST', body:JSON.stringify({ metric_name:metricName }) });
      setAiAnalysis(p => ({...p,[metricName]:r}));
      if (r.escalation_required) toast('AI flagged escalation requirement — audit event logged','error');
      else toast('AI trend analysis complete','success');
    } catch(e) { toast(e.message,'error'); }
    finally { setAiLoading(p => ({...p,[metricName]:false})); }
  }

  // Group by metric name to show latest per metric
  const byMetric = {};
  entries.forEach(e => { if (!byMetric[e.metric_name]) byMetric[e.metric_name] = []; byMetric[e.metric_name].push(e); });

  return (
    <div className="card" style={{ marginTop:16 }}>
      <div className="section-hdr">
        <div className="section-title">📈 Ongoing Monitoring (OSFI E-23 §4.5)</div>
        <button className="btn btn-outline btn-sm" onClick={() => setShowForm(p => !p)}>
          {showForm ? 'Cancel' : '+ Log Metric'}
        </button>
      </div>

      {showForm && (
        <div className="mon-form">
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Metric *</label>
              <select className="form-select" value={form.metric_name} onChange={e => setForm(p => ({...p,metric_name:e.target.value}))}>
                <option value="">Select or type…</option>
                {COMMON_METRICS.map(m => <option key={m} value={m}>{m}</option>)}
              </select>
            </div>
            {form.metric_name === 'Custom' || !COMMON_METRICS.slice(0,-1).includes(form.metric_name) ? (
              <div className="form-group">
                <label className="form-label">Metric Name *</label>
                <input className="form-input" placeholder="e.g. Population Stability Index" value={form.metric_name === 'Custom' ? '' : form.metric_name} onChange={e => setForm(p => ({...p,metric_name:e.target.value}))} />
              </div>
            ) : null}
            <div className="form-group">
              <label className="form-label">Value *</label>
              <input className="form-input" type="number" step="any" placeholder="0.00" value={form.metric_value} onChange={e => setForm(p => ({...p,metric_value:e.target.value}))} />
            </div>
            <div className="form-group">
              <label className="form-label">Amber Threshold</label>
              <input className="form-input" type="number" step="any" placeholder="warn above" value={form.threshold_amber} onChange={e => setForm(p => ({...p,threshold_amber:e.target.value}))} />
            </div>
            <div className="form-group">
              <label className="form-label">Red Threshold</label>
              <input className="form-input" type="number" step="any" placeholder="alert above" value={form.threshold_red} onChange={e => setForm(p => ({...p,threshold_red:e.target.value}))} />
            </div>
            <div className="form-group">
              <label className="form-label">Date</label>
              <input className="form-input" type="date" value={form.logged_at} onChange={e => setForm(p => ({...p,logged_at:e.target.value}))} />
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">Notes</label>
            <textarea className="form-textarea" rows="2" placeholder="Observation or context…" value={form.notes} onChange={e => setForm(p => ({...p,notes:e.target.value}))} />
          </div>
          <div><button className="btn btn-primary btn-sm" onClick={submit} disabled={saving}>{saving ? <><Spinner /> Saving…</> : 'Log Metric'}</button></div>
        </div>
      )}

      {loading && <div className="spinner-center"><Spinner dark size={22} /></div>}
      {!loading && entries.length === 0 && (
        <div style={{ fontSize:13, color:'var(--text-muted)' }}>No monitoring data yet. Log performance metrics (PSI, Gini, Accuracy, etc.) to track model drift over time per OSFI E-23 §4.5.</div>
      )}
      {!loading && entries.length > 0 && (
        <>
          {Object.entries(byMetric).map(([metricName, rows]) => {
            const latest = rows[0];
            const cls = metricClass(latest);
            const breached = cls === 'metric-red';
            return (
              <div key={metricName} style={{ marginBottom:16 }}>
                <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6 }}>
                  <span style={{ fontWeight:700, fontSize:13 }}>{metricName}</span>
                  {breached && <span style={{ fontSize:11, background:'#fee2e2', color:'var(--red)', padding:'1px 8px', borderRadius:10, fontWeight:700 }}>ALERT</span>}
                  <button className="btn btn-ai btn-sm" style={{ marginLeft:'auto' }} onClick={() => runAIAnalysis(metricName)} disabled={aiLoading[metricName]}>
                    {aiLoading[metricName] ? <><Spinner /> Analysing…</> : '🧠 AI Trend Analysis'}
                  </button>
                </div>
                <table className="monitoring-table">
                  <thead><tr><th>Date</th><th>Value</th><th>Thresholds</th><th>Logged by</th><th>Notes</th></tr></thead>
                  <tbody>
                    {rows.slice(0,10).map(e => (
                      <tr key={e.id}>
                        <td>{e.logged_at}</td>
                        <td><span className={`metric-value-cell ${metricClass(e)}`}>{parseFloat(e.metric_value).toFixed(4)}</span></td>
                        <td>
                          <div className="threshold-bar">
                            {e.threshold_amber && <span>⚠️ {e.threshold_amber}</span>}
                            {e.threshold_red   && <span>🔴 {e.threshold_red}</span>}
                            {!e.threshold_amber && !e.threshold_red && <span>—</span>}
                          </div>
                        </td>
                        <td style={{ fontSize:11.5, color:'var(--text-muted)' }}>{e.logged_by_email}</td>
                        <td style={{ fontSize:11.5, color:'var(--text-muted)' }}>{e.notes||'—'}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                {aiAnalysis[metricName] && (
                  <div className="ai-panel" style={{ marginTop:8, padding:'10px 14px' }}>
                    <div style={{ display:'flex', gap:10, alignItems:'center', marginBottom:6, flexWrap:'wrap' }}>
                      <span style={{ fontWeight:700, fontSize:12, color:'var(--navy)' }}>AI Trend: {(aiAnalysis[metricName].trend||'').toUpperCase()}</span>
                      <span style={{ fontSize:11, padding:'1px 8px', borderRadius:10, fontWeight:700,
                        background: aiAnalysis[metricName].trend==='deteriorating'?'#fee2e2':aiAnalysis[metricName].trend==='improving'?'#dcfce7':'#f1f5f9',
                        color: aiAnalysis[metricName].trend==='deteriorating'?'var(--red)':aiAnalysis[metricName].trend==='improving'?'var(--green)':'var(--grey)'
                      }}>{aiAnalysis[metricName].trend_magnitude} magnitude</span>
                      {aiAnalysis[metricName].is_material_drift && <span style={{ fontSize:11, background:'#fff7ed', color:'#c2410c', padding:'1px 8px', borderRadius:10, fontWeight:700 }}>Material Drift</span>}
                      {aiAnalysis[metricName].escalation_required && <span style={{ fontSize:11, background:'#fee2e2', color:'var(--red)', padding:'1px 8px', borderRadius:10, fontWeight:700 }}>Escalation Required</span>}
                    </div>
                    <div style={{ fontSize:12.5, marginBottom:6 }}>{aiAnalysis[metricName].drift_assessment}</div>
                    <div style={{ fontSize:12, color:'var(--text-muted)', marginBottom:6 }}>{aiAnalysis[metricName].osfi_e23_implication}</div>
                    {(aiAnalysis[metricName].recommended_actions||[]).length > 0 && (
                      <ul style={{ paddingLeft:16, margin:0 }}>
                        {aiAnalysis[metricName].recommended_actions.map((a,i) => (
                          <li key={i} style={{ fontSize:12, color:'var(--text-muted)', marginBottom:2 }}>{a}</li>
                        ))}
                      </ul>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   REGULATORY CALENDAR
═══════════════════════════════════════════════════ */
function RegulatoryCalendar() {
  const [events, setEvents]           = useState([]);
  const [loading, setLoading]         = useState(true);
  const [briefing, setBriefing]       = useState(null);
  const [briefingLoading, setBriefingLoading] = useState(false);
  const toast = useToast();

  useEffect(() => {
    apiFetch('/api/calendar/events')
      .then(setEvents).catch(e => toast(e.message,'error')).finally(() => setLoading(false));
  }, []);

  async function getAIBriefing() {
    setBriefingLoading(true);
    try {
      const r = await apiFetch('/api/calendar/ai-briefing');
      setBriefing(r);
    } catch(e) { toast(e.message,'error'); }
    finally { setBriefingLoading(false); }
  }

  const overdue  = events.filter(e => e.urgency === 'overdue');
  const critical = events.filter(e => e.urgency === 'critical');
  const warning  = events.filter(e => e.urgency === 'warning');
  const info     = events.filter(e => e.urgency === 'info');

  function parseDate(ds) {
    if (!ds) return null;
    const d = new Date(ds + (ds.includes('T') ? '' : 'T00:00:00'));
    return { day: d.getDate(), mon: d.toLocaleString('en-CA',{month:'short'}) };
  }

  function CalEvent({ ev }) {
    const dt = parseDate(ev.due_date);
    const daysLabel = ev.days_until === null ? null
      : ev.days_until < 0 ? Math.abs(ev.days_until)+' days overdue'
      : ev.days_until === 0 ? 'Due today'
      : ev.days_until + ' days';
    const chipColor = ev.urgency === 'overdue' ? { background:'#fee2e2', color:'var(--red)' }
      : ev.urgency === 'critical' ? { background:'#fef3c7', color:'#92400e' }
      : { background:'#eff6ff', color:'#1d4ed8' };

    return (
      <div className={`cal-event ${ev.urgency}`}>
        {dt ? (
          <div className={`cal-date-box ${ev.urgency}`}>
            <div className="cal-date-day">{dt.day}</div>
            <div className="cal-date-mon">{dt.mon}</div>
          </div>
        ) : (
          <div className={`cal-date-box info`} style={{ justifyContent:'center' }}>
            <div style={{ fontSize:18 }}>⏳</div>
          </div>
        )}
        <div style={{ flex:1, minWidth:0 }}>
          <div className="cal-event-title">{ev.title}</div>
          <div className="cal-event-sub">{ev.subtitle}{ev.business_unit ? ' · '+ev.business_unit : ''}</div>
        </div>
        {daysLabel && (
          <span className="cal-days-chip" style={chipColor}>{daysLabel}</span>
        )}
      </div>
    );
  }

  if (loading) return <div className="spinner-center"><Spinner dark size={28} /></div>;

  const totalActionable = overdue.length + critical.length;

  return (
    <div>
      <div className="kpi-grid" style={{ marginBottom:20 }}>
        {[
          ['Overdue',         overdue.length,   'kpi-red'],
          ['Due ≤ 30 days',   critical.length,  'kpi-amber'],
          ['Due ≤ 90 days',   warning.length,   'kpi-navy'],
          ['Open Workflows',  info.length,       'kpi-grey'],
        ].map(([l,v,c]) => (
          <div key={l} className="kpi-card">
            <div className="kpi-label">{l}</div>
            <div className={`kpi-value ${c}`}>{v}</div>
          </div>
        ))}
      </div>

      <div className="card" style={{ marginBottom:16 }}>
        <div className="section-hdr">
          <div>
            <div className="section-title">🧠 AI Compliance Briefing</div>
            <div style={{ fontSize:12, color:'var(--text-muted)', marginTop:2 }}>AI-generated weekly priorities for your Chief Risk Officer</div>
          </div>
          <button className="btn btn-ai btn-sm" onClick={getAIBriefing} disabled={briefingLoading}>
            {briefingLoading ? <><Spinner /> Generating…</> : briefing ? '↻ Refresh Briefing' : 'Get AI Briefing'}
          </button>
        </div>
        {briefing && (
          <div className="ai-panel" style={{ marginTop:10 }}>
            <div className="ai-insight">{briefing.briefing}</div>
            <div style={{ fontSize:11, color:'var(--text-muted)', marginTop:6 }}>Generated {new Date(briefing.generated_at).toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'})}</div>
          </div>
        )}
        {!briefing && !briefingLoading && (
          <div style={{ fontSize:13, color:'var(--text-muted)', marginTop:8 }}>Click "Get AI Briefing" for a 2-sentence CRO-ready priority summary of your compliance calendar.</div>
        )}
      </div>

      {events.length === 0 && (
        <div className="card">
          <div style={{ fontSize:13, color:'var(--text-muted)' }}>No upcoming deadlines within 90 days. Your compliance calendar is clear.</div>
        </div>
      )}

      {overdue.length > 0 && (
        <>
          <div className="cal-section-title" style={{ color:'var(--red)' }}>OVERDUE — Immediate Action Required</div>
          {overdue.map(e => <CalEvent key={e.id} ev={e} />)}
        </>
      )}
      {critical.length > 0 && (
        <>
          <div className="cal-section-title" style={{ color:'var(--amber)' }}>DUE WITHIN 30 DAYS</div>
          {critical.map(e => <CalEvent key={e.id} ev={e} />)}
        </>
      )}
      {warning.length > 0 && (
        <>
          <div className="cal-section-title">DUE WITHIN 90 DAYS</div>
          {warning.map(e => <CalEvent key={e.id} ev={e} />)}
        </>
      )}
      {info.length > 0 && (
        <>
          <div className="cal-section-title">OPEN VALIDATION WORKFLOWS</div>
          {info.map(e => <CalEvent key={e.id} ev={e} />)}
        </>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   MODEL RISK APPETITE WIZARD
═══════════════════════════════════════════════════ */
function MRAWizard() {
  const [statement, setStatement] = useState(undefined);
  const [loading, setLoading]     = useState(true);
  const [showForm, setShowForm]   = useState(false);
  const [generating, setGenerating] = useState(false);
  const [approving, setApproving]   = useState(false);
  const [form, setForm] = useState({
    institution_type: 'federally regulated credit union',
    risk_tolerance: 'low',
    max_unvalidated_pct: '0%',
    tier1_frequency: 'annual',
    third_party_posture: 'conservative',
    escalation_threshold: '$5,000,000',
  });
  const toast = useToast();

  function load() {
    setLoading(true);
    apiFetch('/api/risk-appetite/latest')
      .then(setStatement).catch(() => setStatement(null)).finally(() => setLoading(false));
  }
  useEffect(() => { load(); }, []);

  async function generate() {
    setGenerating(true);
    try {
      const r = await apiFetch('/api/risk-appetite/generate',{ method:'POST', body:JSON.stringify(form) });
      setStatement(r);
      setShowForm(false);
      toast('MRA Statement generated','success');
    } catch(e) { toast(e.message,'error'); }
    finally { setGenerating(false); }
  }

  async function approve() {
    if (!statement) return;
    if (!confirm('Approve this Model Risk Appetite Statement? This action will be recorded in the audit trail.')) return;
    setApproving(true);
    try {
      const r = await apiFetch(`/api/risk-appetite/${statement.id}/approve`,{ method:'POST' });
      setStatement(r);
      toast('Statement approved and recorded in audit trail','success');
    } catch(e) { toast(e.message,'error'); }
    finally { setApproving(false); }
  }

  if (loading) return <div className="spinner-center"><Spinner dark size={28} /></div>;

  return (
    <div>
      <div className="card" style={{ marginBottom:16 }}>
        <div className="section-hdr">
          <div>
            <div className="section-title">🎯 Model Risk Appetite Statement</div>
            <div style={{ fontSize:13, color:'var(--text-muted)', marginTop:4 }}>
              Required by OSFI E-23 §3 — defines your institution's tolerance for model risk and the governance boundaries around it.
            </div>
          </div>
          <button className="btn btn-outline btn-sm" onClick={() => setShowForm(p => !p)}>
            {statement ? '↻ New Version' : '+ Create Statement'}
          </button>
        </div>

        {showForm && (
          <div className="mra-wizard" style={{ marginTop:14 }}>
            <div className="form-row">
              <div className="form-group">
                <label className="form-label">Institution Type</label>
                <select className="form-select" value={form.institution_type} onChange={e => setForm(p => ({...p,institution_type:e.target.value}))}>
                  <option value="federally regulated credit union">Federally regulated credit union</option>
                  <option value="domestic bank (Schedule I)">Domestic bank (Schedule I)</option>
                  <option value="foreign bank branch (Schedule II/III)">Foreign bank branch (Schedule II/III)</option>
                  <option value="federally regulated insurance company">Federally regulated insurance company</option>
                  <option value="trust and loan company">Trust and loan company</option>
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">Overall Risk Tolerance</label>
                <select className="form-select" value={form.risk_tolerance} onChange={e => setForm(p => ({...p,risk_tolerance:e.target.value}))}>
                  <option value="zero-tolerance">Zero-tolerance (no material risk accepted)</option>
                  <option value="low">Low (minimal risk, strong controls)</option>
                  <option value="moderate">Moderate (risk accepted within defined limits)</option>
                </select>
              </div>
            </div>
            <div className="form-row">
              <div className="form-group">
                <label className="form-label">Max % Tier 1 Models Without Active Validation</label>
                <select className="form-select" value={form.max_unvalidated_pct} onChange={e => setForm(p => ({...p,max_unvalidated_pct:e.target.value}))}>
                  <option value="0%">0% (all Tier 1 must be validated)</option>
                  <option value="5%">≤5%</option>
                  <option value="10%">≤10%</option>
                  <option value="15%">≤15%</option>
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">Tier 1 Validation Frequency</label>

      {statement && (
        <div className="card">
          <div className="section-hdr" style={{ marginBottom:14 }}>

              <span className="section-title">Statement {statement.version}</span>

          {statement.status === 'approved' && (

              <span>✓ Approved by <strong>{statement.approved_by}</strong> on {new Date(statement.approved_at).toLocaleDateString('en-CA')}</span>

          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   EXAM SPRINT MODE
═══════════════════════════════════════════════════ */
function ExamSprintMode() {
  const [sprint, setSprint]   = useState(undefined);
  const [loading, setLoading] = useState(true);
  const [launching, setLaunching] = useState(false);
  const [tab, setTab]         = useState('gaps');
  const toast = useToast();

  useEffect(() => {
    apiFetch('/api/exam-sprint/latest')
      .then(setSprint).catch(() => setSprint(null)).finally(() => setLoading(false));
  }, []);

  async function launch() {
    setLaunching(true);
    try {
      const r = await apiFetch('/api/exam-sprint/launch',{ method:'POST' });
      setSprint(r);
      setTab('gaps');
      toast('Exam sprint launched — AI gap analysis complete','success');
    } catch(e) { toast(e.message,'error'); }
    finally { setLaunching(false); }
  }

  function reLaunch() {
    if (!confirm('Launch a fresh AI gap analysis? This will replace the current sprint plan.')) return;
    setSprint(null);
    launch();
  }

  const scoreClass = s => s >= 75 ? 'rc-low' : s >= 50 ? 'rc-med' : 'rc-high';
  const chipClass  = l => l === 'high' ? 'rchip-high' : l === 'medium' ? 'rchip-medium' : 'rchip-low';
  const sevCard    = s => s === 'critical' ? 'sev-critical' : s === 'high' ? 'sev-high' : 'sev-medium';
  const sevBadge   = s => s === 'critical' ? 'gsev-critical' : s === 'high' ? 'gsev-high' : 'gsev-medium';

  if (loading) return <div className="spinner-center"><Spinner dark size={28} /></div>;

  return (
    <div>
      <div className="sprint-hero">
        <div style={{ flex:1 }}>
          <div className="sprint-hero-title">🚨 OSFI Exam Sprint Mode</div>
          <div className="sprint-hero-sub">
            AI-powered Emergency Examination Readiness. Full compliance gap analysis against OSFI E-23 with a prioritized 30/60/90-day action plan.
          </div>
          {sprint && (
            <div style={{ marginTop:14, display:'flex', gap:10, flexWrap:'wrap', alignItems:'center' }}>
              <span style={{ fontSize:12, opacity:0.8 }}>Last analysis: {new Date(sprint.created_at).toLocaleDateString('en-CA')}</span>
              <span className={`risk-chip ${chipClass(sprint.exam_risk_level)}`}>{(sprint.exam_risk_level||'').toUpperCase()} EXAM RISK</span>
              <button className="btn btn-sm" style={{ background:'rgba(255,255,255,0.18)', color:'#fff', border:'1px solid rgba(255,255,255,0.3)' }} onClick={reLaunch} disabled={launching}>
                {launching ? <><Spinner /> Analysing…</> : '↻ Refresh Analysis'}
              </button>
            </div>
          )}
          {!sprint && (
            <button className="btn btn-lg" style={{ marginTop:16, background:'#fff', color:'var(--red)', fontWeight:800 }} onClick={launch} disabled={launching}>
              {launching ? <><Spinner dark size={16} /> Running AI Gap Analysis…</> : '⚡ Launch Exam Sprint'}
            </button>
          )}
        </div>
        {sprint && (
          <div className={`readiness-circle ${scoreClass(sprint.overall_readiness_score)}`}>
            <div className="readiness-num">{sprint.overall_readiness_score}</div>
            <div className="readiness-lbl">Readiness</div>
          </div>
        )}
      </div>

      {!sprint && !launching && (
        <div className="card">
          <div className="section-title" style={{ marginBottom:14 }}>What Exam Sprint Covers</div>
          {[
            ['🔍','Compliance Gap Analysis','Scans your model inventory, validation records, and vendor assessments against every OSFI E-23 requirement with specific §section references.'],
            ['📅','30/60/90-Day Sprint Plan','Prioritized action plan by urgency — P1 actions for immediate resolution, P2 for medium-term — with assigned owners and OSFI references.'],
            ['❓','Examiner Question Prep','Predicts the questions an OSFI examiner is most likely to ask based on your current posture, so your team can prepare responses in advance.'],
            ['⚡','Quick Wins','Actions you can complete today or this week to immediately improve your readiness before the full remediation plan is underway.'],
          ].map(([icon,t,d]) => (
            <div key={t} className="sprint-feature-row">
              <span style={{ fontSize:22, flex:'0 0 30px' }}>{icon}</span>
              <div><div style={{ fontWeight:700, marginBottom:4 }}>{t}</div><div style={{ fontSize:13, color:'var(--text-muted)' }}>{d}</div></div>
            </div>
          ))}
        </div>
      )}

      {sprint && (
        <>
          <div className="card" style={{ marginBottom:16 }}>
            <div style={{ fontWeight:700, marginBottom:8, fontSize:14 }}>Executive Summary</div>
            <div style={{ fontSize:13.5, lineHeight:1.65 }}>{sprint.executive_summary}</div>
          </div>

          <div className="admin-tabs" style={{ marginBottom:16 }}>
            {[['gaps','Critical Gaps'],['plan','Sprint Plan'],['prep','Exam Prep']].map(([k,l]) => (
              <button key={k} className={`admin-tab${tab===k?' active':''}`} onClick={() => setTab(k)}>{l}</button>
            ))}
          </div>

          {tab === 'gaps' && (
            <>
              {(sprint.critical_gaps||[]).length > 0 ? (
                <div className="gap-grid">
                  {sprint.critical_gaps.map((g,i) => (
                    <div key={i} className={`gap-card ${sevCard(g.severity)}`}>
                      <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:8 }}>
                        <span className={`gap-sev ${sevBadge(g.severity)}`}>{g.severity}</span>
                        <span style={{ fontSize:11.5, color:'var(--text-muted)', fontWeight:700 }}>{g.osfi_section}</span>
                        {g.affected_count > 0 && <span style={{ marginLeft:'auto', fontSize:11.5, color:'var(--text-muted)' }}>{g.affected_count} model{g.affected_count!==1?'s':''}</span>}

                <div className="card"><div style={{ fontSize:13, color:'var(--text-muted)' }}>No critical gaps identified. Your compliance posture is strong.</div></div>
              )}
              {(sprint.strengths||[]).length > 0 && (
                <div className="card">
                  <div className="section-title" style={{ marginBottom:12 }}>Compliance Strengths</div>

                    {sprint.strengths.map((s,i) => <span key={i} className="strength-chip">{s}</span>)}

                </div>
              )}

          )}

          {tab === 'plan' && (
            <div className="sprint-cols">
              {[['day_30','Day 30','shdr-30'],['day_60','Day 60','shdr-60'],['day_90','Day 90','shdr-90']].map(([key,label,cls]) => (
                <div key={key} className="sprint-col">
                  <div className={`sprint-col-hdr ${cls}`}>{label} Actions</div>
                  <div className="sprint-col-body">
                    {((sprint.sprint_plan||{})[key]||[]).length === 0 && (
                      <div style={{ fontSize:12, color:'var(--text-muted)', padding:'4px 0' }}>No actions for this period.</div>
                    )}
                    {((sprint.sprint_plan||{})[key]||[]).map((a,i) => (
                      <div key={i} className="sprint-action">
                        <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:4 }}>
                          <span className={`ap-badge ${a.priority==='P1'?'ap-p1':'ap-p2'}`}>{a.priority}</span>
                          <span style={{ fontSize:10.5, color:'var(--text-muted)', fontWeight:700 }}>{a.osfi_ref}</span>
                        </div>
                        <div style={{ fontSize:12.5, fontWeight:500, marginBottom:3 }}>{a.action}</div>
                        {a.owner && <div style={{ fontSize:11.5, color:'var(--text-muted)' }}>Owner: {a.owner}</div>}
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          )}

          {tab === 'prep' && (
            <>
              {(sprint.quick_wins||[]).length > 0 && (
                <div className="card" style={{ marginBottom:16 }}>
                  <div className="section-title" style={{ marginBottom:12 }}>Quick Wins (Do Today)</div>
                  <ul className="qw-list">{sprint.quick_wins.map((w,i) => <li key={i}>{w}</li>)}</ul>
                </div>
              )}
              {(sprint.examiner_likely_questions||[]).length > 0 && (
                <div className="card">
                  <div className="section-title" style={{ marginBottom:12 }}>Likely Examiner Questions</div>
                  <ul className="eq-list">{sprint.examiner_likely_questions.map((q,i) => <li key={i}>{q}</li>)}</ul>
                </div>
              )}

          )}
        </>
      )}
    </div>
  );
}

function MRMPolicyGenerator() {
  const [step, setStep] = useState('form'); // form | generating | result
  const [policy, setPolicy] = useState(null);
  const [existing, setExisting] = useState(null);
  const [saving, setSaving] = useState(false);
  const [expanded, setExpanded] = useState({});
  const toast = useToast();

  const [form, setForm] = useState({
    institution_type: 'bank',
    asset_size: '1B_20B',
    model_count: '10_50',
    board_frequency: 'quarterly',
    validation_team_size: '2_5',
    high_risk_categories: 'Credit Scoring, Stress Testing, Fraud Detection',
    risk_appetite_level: 'moderate',
    existing_framework: '',
    regulatory_submissions: 'DFAST, IFRS 9, AIRB',
    additional_context: '',
  });
  const set = (k,v) => setForm(p => ({...p,[k]:v}));

  useEffect(() => {
    apiFetch('/api/mrm-policy/latest').then(p => { if (p) setExisting(p); }).catch(()=>{});
  }, []);

  async function generate() {
    setStep('generating'); setSaving(true);
    try {
      const r = await apiFetch('/api/mrm-policy/generate', { method:'POST', body:JSON.stringify(form) });
      setPolicy(r); setStep('result');
    } catch(e) { toast(e.message,'error'); setStep('form'); }
    finally { setSaving(false); }
  }

  async function approve() {
    if (!policy?.id) return;
    try {
      await apiFetch(`/api/mrm-policy/${policy.id}/approve`, { method:'POST' });
      setPolicy(p => ({...p, status:'approved'}));
      toast('Policy approved and version-locked','success');
    } catch(e) { toast(e.message,'error'); }

            <div>
              <div className="section-title">Current Policy</div>

          </div>
        </div>

        <div className="policy-form">
          <div className="policy-form-grid">

            <div className="form-group">

                <option value="1B_20B">$1B – $20B</option>
                <option value="20B_100B">$20B – $100B</option>
                <option value="over_100B">Over $100B</option>
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Approximate Model Count</label>
              <select className="form-select" value={form.model_count} onChange={e => set('model_count',e.target.value)}>
                <option value="under_10">Under 10</option>
                <option value="10_50">10 – 50</option>
                <option value="50_200">50 – 200</option>
                <option value="over_200">Over 200</option>
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Board Meeting Frequency</label>
              <select className="form-select" value={form.board_frequency} onChange={e => set('board_frequency',e.target.value)}>
                <option value="monthly">Monthly</option>
                <option value="quarterly">Quarterly</option>

            <div className="form-group">

            <div className="form-group">

  if (step === 'generating') return (

      <div style={{ marginTop:18, fontSize:15, fontWeight:600, color:'var(--navy)' }}>Drafting your OSFI E-23 MRM Policy…</div>

  return (
    <div>
      {policy && (
        <>
          <div className="policy-cover">

            <div className="policy-cover-inst">{policy.institution_name}</div>
            <div className="policy-cover-meta">Version {policy.version} · Effective {policy.effective_date} · Review Cycle: {policy.review_cycle}</div>
            <div style={{ marginTop:16, display:'flex', gap:10, justifyContent:'center', flexWrap:'wrap' }}>

          {(policy.sections||[]).map((s, i) => (
            <div key={i} className="policy-section">

            </div>
