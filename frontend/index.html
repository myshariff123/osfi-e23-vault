function ModelForm({ modelId, setScreen, setDetailModelId }) {
  const isEdit = !!modelId;
  const toast = useToast();
  const [loading, setLoading] = useState(isEdit);
  const [saving, setSaving] = useState(false);
  const [aiLoading, setAiLoading] = useState(false);
  const [aiSuggested, setAiSuggested] = useState({});
  const [form, setForm] = useState({
    name: '', version: '1.0', description: '', purpose: '',
    business_unit: '', model_owner_name: '', model_owner_email: '',
    methodology_type: 'statistical', input_data_sources: '',
    production_system: '', deployed_at: '',
    is_third_party: false, vendor_name: '', vendor_product: '',
    insurance_category: '', is_spreadsheet_model: false, spreadsheet_location: '',
    is_ifrs17_model: false, ifrs17_component: '',
    regulatory_capital_linked: false, capital_framework: '',
  });

  useEffect(() => {
    if (!isEdit) return;
    apiFetch(`/api/models/${modelId}`)
      .then(d => setForm(prev => ({ ...prev, ...d })))
      .catch(e => toast(e.message, 'error'))
      .finally(() => setLoading(false));
  }, [modelId]);

  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));

  async function aiSmartFill() {
    if (!form.name.trim()) { toast('Enter a model name first to use AI Smart Fill', 'info'); return; }
    setAiLoading(true);
    try {
      const r = await apiFetch('/api/ai/suggest-model-fields', {
        method: 'POST',
        body: JSON.stringify({ name: form.name, description: form.description }),
      });
      const suggested = {};
      if (r.methodology_type) { set('methodology_type', r.methodology_type); suggested.methodology_type = true; }
      if (r.purpose)           { set('purpose', r.purpose); suggested.purpose = true; }
      if (r.business_unit)     { set('business_unit', r.business_unit); suggested.business_unit = true; }
      if (r.input_data_sources){ set('input_data_sources', r.input_data_sources); suggested.input_data_sources = true; }
      setAiSuggested(prev => ({ ...prev, ...suggested }));
      toast('AI Smart Fill applied — review and adjust as needed', 'success');
    } catch (e) { toast(e.message, 'error'); }
    finally { setAiLoading(false); }
  }

  async function handleSubmit(e) {
    e.preventDefault();
    setSaving(true);
    try {
      const method = isEdit ? 'PUT' : 'POST';
      const url    = isEdit ? `/api/models/${modelId}` : '/api/models';
      const result = await apiFetch(url, { method, body: JSON.stringify(form) });
      toast(isEdit ? 'Model updated' : 'Model created', 'success');
      setDetailModelId(result?.id || modelId);
      setScreen('model_detail');
    } catch (e) { toast(e.message, 'error'); }
    finally { setSaving(false); }
  }

  const Lbl = ({ field, children }) => (
    <label className="form-label">
      {children}
      {aiSuggested[field] && <span className="ai-tag">AI Suggested</span>}
    </label>
  );

  if (loading) return <div className="spinner-center"><Spinner dark size={28} /></div>;

  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 20, flexWrap: 'wrap' }}>
        <button className="btn btn-ghost btn-sm" onClick={() => setScreen('models')}>← Back</button>
        <h2 style={{ fontSize: 16, fontWeight: 700 }}>{isEdit ? 'Edit Model' : 'Add New Model'}</h2>
        <button className="btn btn-ai btn-sm" style={{ marginLeft: 'auto' }} onClick={aiSmartFill} disabled={aiLoading}>
          {aiLoading ? <><Spinner /> Analysing…</> : '✨ AI Smart Fill'}
        </button>
      </div>
      <div className="card">
        <form onSubmit={handleSubmit}>
          <div className="form-grid">
            <div className="form-group">
              <Lbl field="name">Model Name *</Lbl>
              <input className={`form-control${aiSuggested.name ? ' ai-filled' : ''}`} value={form.name} onChange={e => set('name', e.target.value)} required />
            </div>
            <div className="form-group">
              <label className="form-label">Version *</label>
              <input className="form-control" value={form.version} onChange={e => set('version', e.target.value)} required />
            </div>
            <div className="form-group full">
              <Lbl field="description">Description</Lbl>
              <textarea className={`form-control${aiSuggested.description ? ' ai-filled' : ''}`} value={form.description} onChange={e => set('description', e.target.value)} rows={3} />
            </div>
            <div className="form-group full">
              <Lbl field="purpose">Purpose</Lbl>
              <textarea className={`form-control${aiSuggested.purpose ? ' ai-filled' : ''}`} value={form.purpose} onChange={e => set('purpose', e.target.value)} rows={2} />
            </div>
            <div className="form-group">
              <Lbl field="business_unit">Business Unit</Lbl>
              <input className={`form-control${aiSuggested.business_unit ? ' ai-filled' : ''}`} value={form.business_unit} onChange={e => set('business_unit', e.target.value)} />
            </div>
            <div className="form-group">
              <label className="form-label">Methodology Type</label>
              <select className={`form-control${aiSuggested.methodology_type ? ' ai-filled' : ''}`} value={form.methodology_type} onChange={e => set('methodology_type', e.target.value)}>
                <option value="rule_based">Rule-Based</option>
                <option value="statistical">Statistical</option>
                <option value="ml">Machine Learning</option>
                <option value="deep_learning">Deep Learning</option>
                <option value="other">Other</option>
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Model Owner Name</label>
              <input className="form-control" value={form.model_owner_name} onChange={e => set('model_owner_name', e.target.value)} />
            </div>
            <div className="form-group">
              <label className="form-label">Model Owner Email</label>
              <input className="form-control" type="email" value={form.model_owner_email} onChange={e => set('model_owner_email', e.target.value)} />
            </div>
            <div className="form-group full">
              <Lbl field="input_data_sources">Input Data Sources</Lbl>
              <textarea className={`form-control${aiSuggested.input_data_sources ? ' ai-filled' : ''}`} value={form.input_data_sources} onChange={e => set('input_data_sources', e.target.value)} rows={2} />
            </div>
            <div className="form-group">
              <label className="form-label">Production System</label>
              <input className="form-control" value={form.production_system} onChange={e => set('production_system', e.target.value)} />
            </div>
            <div className="form-group">
              <label className="form-label">Deployed At</label>
              <input className="form-control" type="date" value={form.deployed_at} onChange={e => set('deployed_at', e.target.value)} />
            </div>
            <div className="form-group full">
              <div className="checkbox-row">
                <input type="checkbox" id="is_tp" checked={!!form.is_third_party} onChange={e => set('is_third_party', e.target.checked)} />
                <label htmlFor="is_tp" style={{ fontWeight: 500, fontSize: 14, cursor: 'pointer' }}>This is a third-party / vendor model</label>
              </div>
            </div>
            {form.is_third_party && (
              <>
                <div className="form-group">
                  <label className="form-label">Vendor Name</label>
                  <input className="form-control" value={form.vendor_name} onChange={e => set('vendor_name', e.target.value)} />
                </div>
                <div className="form-group">
                  <label className="form-label">Vendor Product</label>
                  <input className="form-control" value={form.vendor_product} onChange={e => set('vendor_product', e.target.value)} />
                </div>
              </>
            )}

            {/* ── Insurance Classification (Phase 7) ── */}
            <div className="form-group full" style={{ marginTop:8 }}>
              <div style={{ fontSize:12, fontWeight:700, textTransform:'uppercase', letterSpacing:'.5px', color:'var(--text-muted)', marginBottom:10, paddingTop:10, borderTop:'1px solid var(--border)' }}>
                Insurance Classification
              </div>
            </div>
            <div className="form-group full">
              <label className="form-label">Insurance Model Category</label>
              <select className="form-control" value={form.insurance_category} onChange={e => {
                const v = e.target.value;
                set('insurance_category', v);
                if (v === 'ifrs17') set('is_ifrs17_model', true);
                else set('is_ifrs17_model', false);
                if (['capital_orsa','stress_testing'].includes(v)) set('regulatory_capital_linked', true);
              }}>
                <option value="">— Select category —</option>
                <optgroup label="Actuarial">
                  <option value="actuarial_reserving">Actuarial Reserving (IBNR / Chain Ladder / BF)</option>
                  <option value="pricing_rating">Pricing / Rating (GLM, GBM, Experience Rating)</option>
                  <option value="claims">Claims Frequency / Severity</option>
                </optgroup>
                <optgroup label="Risk & Capital">
                  <option value="catastrophe">Catastrophe / Natural Peril (RMS, AIR, Verisk)</option>
                  <option value="capital_orsa">Capital / ORSA / DFA</option>
                  <option value="stress_testing">Stress Testing / Scenario Analysis</option>
                  <option value="alm">ALM / Investment Risk</option>
                </optgroup>
                <optgroup label="Financial Reporting">
                  <option value="ifrs17">IFRS 17 (CSM, Risk Adjustment, Discount Curve)</option>
                </optgroup>
                <optgroup label="Underwriting & Compliance">
                  <option value="underwriting_scoring">Underwriting Scoring / Appetite</option>
                  <option value="fraud_detection">Fraud Detection</option>
                  <option value="aml">AML / Transaction Monitoring</option>
                  <option value="credit_risk">Credit Risk</option>
                  <option value="market_risk">Market Risk / VaR</option>
                  <option value="operational_risk">Operational Risk</option>
                </optgroup>
                <option value="other">Other</option>
              </select>
            </div>

            {form.is_ifrs17_model && (
              <div className="form-group">
                <label className="form-label">IFRS 17 Component</label>
                <select className="form-control" value={form.ifrs17_component} onChange={e => set('ifrs17_component', e.target.value)}>
                  <option value="">— Select component —</option>
                  <option value="csm">Contractual Service Margin (CSM)</option>
                  <option value="risk_adjustment">Risk Adjustment</option>
                  <option value="discount_curve">Discount Curve / Rate</option>
                  <option value="fulfilment_cashflows">Fulfilment Cash Flows</option>
                  <option value="pat">Premium Allocation Approach (PAA)</option>
                </select>
              </div>
            )}

            {form.regulatory_capital_linked && (
              <div className="form-group">
                <label className="form-label">Capital Framework</label>
                <select className="form-control" value={form.capital_framework} onChange={e => set('capital_framework', e.target.value)}>
                  <option value="">— Select framework —</option>
                  <option value="MCT">MCT (Minimum Capital Test — P&C)</option>
                  <option value="LICAT">LICAT (Life Insurance Capital Adequacy Test)</option>
                  <option value="ORSA">ORSA (Own Risk &amp; Solvency Assessment)</option>
                  <option value="DFA">DFA (Dynamic Financial Analysis)</option>
                  <option value="ICA">ICA (Internal Capital Assessment)</option>
                  <option value="other">Other</option>
                </select>
              </div>
            )}

            <div className="form-group full">
              <div className="checkbox-row">
                <input type="checkbox" id="is_ss" checked={!!form.is_spreadsheet_model}
                  onChange={e => set('is_spreadsheet_model', e.target.checked)} />
                <label htmlFor="is_ss" style={{ fontWeight:500, fontSize:14, cursor:'pointer' }}>
                  This model is implemented in a Spreadsheet / Excel workbook
                </label>
              </div>
              {form.is_spreadsheet_model && (
                <div style={{ marginTop:8 }}>
                  <input className="form-control" placeholder="Spreadsheet location (SharePoint path, network drive, etc.)"
                    value={form.spreadsheet_location} onChange={e => set('spreadsheet_location', e.target.value)} />
                  <div className="spreadsheet-warn">
                    ⚠️ <span><strong>Enhanced controls required.</strong> Spreadsheet models require Tier 1 treatment with version-controlled workbook, cell-level protection, and annual independent validation per OSFI E-23 §4.2. Ensure an offline backup copy exists.</span>
                  </div>
                </div>
              )}
            </div>

            <div className="form-group full">
              <div className="checkbox-row">
                <input type="checkbox" id="is_cap" checked={!!form.regulatory_capital_linked}
                  onChange={e => set('regulatory_capital_linked', e.target.checked)} />
                <label htmlFor="is_cap" style={{ fontWeight:500, fontSize:14, cursor:'pointer' }}>
                  This model feeds a regulatory capital calculation (MCT / LICAT / ORSA)
                </label>
              </div>
            </div>
          </div>
          <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end', marginTop: 22 }}>
            <button type="button" className="btn btn-ghost" onClick={() => setScreen('models')}>Cancel</button>
            <button type="submit" className="btn btn-primary" disabled={saving}>
              {saving ? <><Spinner /> Saving…</> : isEdit ? 'Update Model' : 'Create Model'}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   MODEL DETAIL
═══════════════════════════════════════════════════ */
function ModelDetail({ modelId, setScreen, setEditModelId, setRateModelId }) {
  const [model, setModel] = useState(null);
  const [loading, setLoading] = useState(true);
  const [allModels, setAllModels] = useState([]);
  const [aiAdvice, setAiAdvice] = useState(null);
  const [aiLoading, setAiLoading] = useState(false);
  const toast = useToast();

  function reload() {
    setLoading(true);
    Promise.all([
      apiFetch(`/api/models/${modelId}`),
      apiFetch('/api/models'),
    ]).then(([m, all]) => { setModel(m); setAllModels(all); })
      .catch(e => toast(e.message, 'error'))
      .finally(() => setLoading(false));
  }
  useEffect(() => { reload(); }, [modelId]);

  async function getAiAdvice() {
    setAiLoading(true);
    try {
      const r = await apiFetch(`/api/models/${modelId}/ai-advice`, { method: 'POST' });
      setAiAdvice(r);
    } catch (e) { toast(e.message, 'error'); }
    finally { setAiLoading(false); }
  }

  async function requestValidation() {
    try {
      await apiFetch('/api/validations', {
        method: 'POST',
        body: JSON.stringify({ model_id: modelId, validation_type: 'full' }),
      });
      toast('Validation requested successfully', 'success');
    } catch (e) { toast(e.message, 'error'); }
  }

  async function markValidated() {
    try {
      await apiFetch(`/api/models/${modelId}/validate`, { method: 'POST' });
      toast('Model marked as validated', 'success');
      reload();
    } catch (e) { toast(e.message, 'error'); }
  }

  if (loading) return <div className="spinner-center"><Spinner dark size={28} /></div>;
  if (!model) return <div className="empty-state">Model not found.</div>;

  const prioCls = { critical: 'prio-critical', high: 'prio-high', medium: 'prio-medium', low: 'prio-low' };

  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 18, flexWrap: 'wrap' }}>
        <button className="btn btn-ghost btn-sm" onClick={() => setScreen('models')}>← Back</button>
        <h2 style={{ fontSize: 16, fontWeight: 700 }}>{model.name}</h2>
        <span style={{ fontSize: 13, color: 'var(--text-muted)' }}>v{model.version}</span>
        <TierBadge tier={model.current_tier} />
        {model.is_third_party && <span className="badge badge-vendor">Vendor</span>}
        <div style={{ marginLeft: 'auto', display: 'flex', gap: 8, flexWrap: 'wrap' }}>
          <button className="btn btn-ghost btn-sm" onClick={() => { setEditModelId(modelId); setScreen('model_form'); }}>Edit</button>
          <button className="btn btn-primary btn-sm" onClick={() => { setRateModelId(modelId); setScreen('rate_wizard'); }}>Rate Risk</button>
          <button className="btn btn-outline btn-sm" onClick={requestValidation}>Request Validation</button>
          <button className="btn btn-success btn-sm" onClick={markValidated}>Mark Validated</button>
        </div>
      </div>

      {model.revalidation_required && (
        <div className="reval-banner">
          ⚠️ <strong>Re-validation Required</strong> — A material change has been logged. Independent re-validation required under OSFI E-23 §4.3.
        </div>
      )}

      <div className="card" style={{ marginBottom: 16 }}>
        <div className="section-title" style={{ marginBottom: 14 }}>Model Fields</div>
        <div className="detail-grid">
          {[
            ['Business Unit',     model.business_unit],
            ['Owner',             model.model_owner_name],
            ['Owner Email',       model.model_owner_email],
            ['Methodology',       (model.methodology_type || '').replace(/_/g, ' ')],
            ['Production System', model.production_system],
            ['Deployed At',       model.deployed_at],
          ].map(([l, v]) => (
            <div key={l} className="detail-item"><div className="dl">{l}</div><div className="dv">{v || '—'}</div></div>
          ))}
          {model.purpose && (
            <div className="detail-item" style={{ gridColumn: '1/-1' }}>
              <div className="dl">Purpose</div><div className="dv">{model.purpose}</div>
            </div>
          )}
          {model.input_data_sources && (
            <div className="detail-item" style={{ gridColumn: '1/-1' }}>
              <div className="dl">Input Data Sources</div><div className="dv">{model.input_data_sources}</div>
            </div>
          )}
          {model.is_third_party && (
            <>
              <div className="detail-item"><div className="dl">Vendor Name</div><div className="dv">{model.vendor_name || '—'}</div></div>
              <div className="detail-item"><div className="dl">Vendor Product</div><div className="dv">{model.vendor_product || '—'}</div></div>
            </>
          )}
        </div>
      </div>

      {/* ── Insurance Profile (Phase 7) ── */}
      {(model.insurance_category || model.is_spreadsheet_model || model.is_ifrs17_model || model.regulatory_capital_linked) && (() => {
        const INS_LABEL = {
          actuarial_reserving:'Actuarial Reserving', pricing_rating:'Pricing / Rating',
          catastrophe:'Catastrophe / Natural Peril', capital_orsa:'Capital / ORSA / DFA',
          ifrs17:'IFRS 17', underwriting_scoring:'Underwriting Scoring',
          claims:'Claims Frequency / Severity', fraud_detection:'Fraud Detection',
          alm:'ALM / Investment Risk', stress_testing:'Stress Testing',
          credit_risk:'Credit Risk', market_risk:'Market Risk / VaR',
          operational_risk:'Operational Risk', aml:'AML / Transaction Monitoring', other:'Other',
        };
        const IFRS17_LABEL = { csm:'CSM', risk_adjustment:'Risk Adjustment', discount_curve:'Discount Curve', fulfilment_cashflows:'Fulfilment CFs', pat:'PAA' };
        return (
          <div className="ins-profile-card" style={{ marginBottom:16 }}>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:8 }}>
              <span style={{ fontSize:12.5, fontWeight:700, color:'var(--navy)' }}>Insurance Profile</span>
              <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
                {model.insurance_category && <span className="ins-category-badge">🏛 {INS_LABEL[model.insurance_category] || model.insurance_category}</span>}
                {model.is_spreadsheet_model && <span className="ins-flag ins-flag-spreadsheet">📊 Spreadsheet Model</span>}
                {model.is_ifrs17_model && <span className="ins-flag ins-flag-ifrs17">📋 IFRS 17{model.ifrs17_component ? ` — ${IFRS17_LABEL[model.ifrs17_component]||model.ifrs17_component}` : ''}</span>}
                {model.regulatory_capital_linked && <span className="ins-flag ins-flag-capital">🏦 Capital Linked{model.capital_framework ? ` (${model.capital_framework})` : ''}</span>}
              </div>
            </div>
            {model.is_spreadsheet_model && (
              <div className="spreadsheet-warn" style={{ marginTop:10 }}>
                ⚠️ <span><strong>Enhanced validation controls required.</strong> Spreadsheet models carry elevated operational risk. Ensure version-controlled workbook, cell protection, offline backup, and annual independent validation. OSFI E-23 §4.2.</span>
              </div>
            )}
            {model.spreadsheet_location && (
              <div style={{ marginTop:8, fontSize:12.5 }}><span style={{ color:'var(--text-muted)' }}>Location: </span>{model.spreadsheet_location}</div>
            )}
          </div>
        );
      })()}

      {model.ratings && model.ratings.length > 0 && (
        <div className="card" style={{ marginBottom: 16 }}>
          <div className="section-title" style={{ marginBottom: 14 }}>Rating History</div>
          {model.ratings.map((r, i) => (
            <div key={i} className="history-item">
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6, flexWrap: 'wrap' }}>
                <TierBadge tier={r.tier} />
                <span style={{ fontSize: 12, color: 'var(--text-muted)' }}>{r.rated_at} · {r.rated_by}</span>
                <span style={{ marginLeft: 'auto', fontSize: 13 }}>Score: <strong>{r.score}</strong></span>
              </div>
              {r.ai_reasoning && (
                <div className="ai-panel" style={{ marginTop: 6 }}>
                  <div className="ai-insight">{r.ai_reasoning}</div>
                </div>
              )}
            </div>
          ))}
        </div>
      )}

      {model.validations && model.validations.length > 0 && (
        <div className="card" style={{ marginBottom: 16 }}>
          <div className="section-title" style={{ marginBottom: 14 }}>Validation History</div>
          {model.validations.map((v, i) => (
            <div key={i} className="history-item">
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap' }}>
                <StatusBadge status={v.status} />
                <span style={{ fontWeight: 600 }}>{(v.validation_type || '').replace(/_/g, ' ')}</span>
                <span style={{ fontSize: 12, color: 'var(--text-muted)' }}>{v.created_at}</span>
                {v.assigned_to && <span style={{ fontSize: 12 }}>Assigned: {v.assigned_to}</span>}
                {v.outcome && <StatusBadge status={v.outcome} />}
              </div>
              {v.findings && <div style={{ marginTop: 6, fontSize: 13, color: 'var(--text-muted)' }}>{v.findings}</div>}
            </div>
          ))}
        </div>
      )}

      <AssumptionRegister modelId={modelId} />
      <ModelDependencies modelId={modelId} allModels={allModels} />

      <div className="card">
        <div className="section-hdr">
          <div className="section-title">🤖 AI Model Advice</div>
          <button className="btn btn-ai btn-sm" onClick={getAiAdvice} disabled={aiLoading}>
            {aiLoading ? <><Spinner /> Analysing…</> : 'Get AI Advice'}
          </button>
        </div>
        {!aiAdvice && !aiLoading && (
          <div style={{ fontSize: 13, color: 'var(--text-muted)' }}>
            Get AI-powered OSFI E-23 gap analysis, remediation actions, and validation scoping for this model.
          </div>
        )}
        {aiLoading && <div className="spinner-center"><Spinner dark size={24} /></div>}
        {aiAdvice && (
          <div className="ai-panel">
            <div className="ai-panel-hdr">
              <span className="ai-icon">🧠</span>
              AI Risk Advice
              <span className={`ai-prio-badge ${prioCls[aiAdvice.priority] || ''}`}>{aiAdvice.priority}</span>
            </div>
            <div className="ai-insight">{aiAdvice.executive_summary}</div>
            {aiAdvice.immediate_actions?.length > 0 && (
              <div className="ai-sec">
                <div className="ai-sec-title">Immediate Actions</div>
                <ul className="ai-list">{aiAdvice.immediate_actions.map((a, i) => <li key={i}>{a}</li>)}</ul>
              </div>
            )}
            {aiAdvice.osfi_e23_gaps?.length > 0 && (
              <div className="ai-sec">
                <div className="ai-sec-title">OSFI E-23 Gaps</div>
                <ul className="ai-list">{aiAdvice.osfi_e23_gaps.map((g, i) => <li key={i}>{g}</li>)}</ul>
              </div>
            )}
            {aiAdvice.validation_scope && (
              <div className="ai-sec">
                <div className="ai-sec-title">Validation Scope</div>
                <div className="ai-insight">{aiAdvice.validation_scope}</div>
              </div>
            )}
            {aiAdvice.estimated_effort && (
              <div style={{ marginTop: 10, fontSize: 13 }}>
                Estimated Effort: <strong>{aiAdvice.estimated_effort}</strong>
              </div>
            )}
          </div>
        )}
      </div>
      <ModelChangeSection modelId={modelId} onRevalidationNeeded={reload} />
      <ModelMonitoringSection modelId={modelId} />
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   MODEL CHANGE SECTION
═══════════════════════════════════════════════════ */
function ModelChangeSection({ modelId, onRevalidationNeeded }) {
  const [changes, setChanges]   = useState([]);
  const [loading, setLoading]   = useState(true);
  const [showForm, setShowForm] = useState(false);
  const [form, setForm]         = useState({ version_label:'', change_type:'minor', change_category:'other', change_reason:'', is_material:false });
  const [saving, setSaving]     = useState(false);
  const [aiLoading, setAiLoading] = useState({});
  const toast = useToast();

  function load() {
    setLoading(true);
    apiFetch(`/api/models/${modelId}/changes`)
      .then(setChanges).catch(e => toast(e.message,'error')).finally(() => setLoading(false));
  }
  useEffect(() => { load(); }, [modelId]);

  async function submit() {
    if (!form.version_label.trim()||!form.change_reason.trim())
      return toast('Version label and reason are required','error');
    setSaving(true);
    try {
      await apiFetch(`/api/models/${modelId}/changes`,{ method:'POST', body:JSON.stringify(form) });
      toast('Change logged','success');
      setShowForm(false);
      setForm({ version_label:'', change_type:'minor', change_category:'other', change_reason:'', is_material:false });
      load();
      if (form.is_material && onRevalidationNeeded) onRevalidationNeeded();
    } catch(e) { toast(e.message,'error'); }
    finally { setSaving(false); }
  }

  async function runAIMateriality(c) {
    setAiLoading(p => ({...p,[c.id]:true}));
    try {
      await apiFetch(`/api/models/${modelId}/changes/${c.id}/ai-materiality`,{ method:'POST' });
      toast('AI materiality assessment complete','success');
      load();
      if (onRevalidationNeeded) onRevalidationNeeded();
    } catch(e) { toast(e.message,'error'); }
    finally { setAiLoading(p => ({...p,[c.id]:false})); }
  }

  const CAT = { methodology:'Methodology', data_source:'Data Source', threshold:'Threshold', vendor:'Vendor', regulatory:'Regulatory', other:'Other' };

  return (
    <div className="card" style={{ marginTop:16 }}>
      <div className="section-hdr">
        <div className="section-title">📋 Change History</div>
        <button className="btn btn-outline btn-sm" onClick={() => setShowForm(p => !p)}>
          {showForm ? 'Cancel' : '+ Log Change'}
        </button>
      </div>

      {showForm && (
        <div className="change-log-form">
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">New Version Label *</label>
              <input className="form-input" placeholder="e.g. v1.1, v2.0" value={form.version_label} onChange={e => setForm(p => ({...p,version_label:e.target.value}))} />
            </div>
            <div className="form-group">
              <label className="form-label">Change Type *</label>
              <select className="form-select" value={form.change_type} onChange={e => setForm(p => ({...p,change_type:e.target.value}))}>
                <option value="patch">Patch (minor fix)</option>
                <option value="minor">Minor (non-material update)</option>
                <option value="major">Major (material change)</option>
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Category</label>
              <select className="form-select" value={form.change_category} onChange={e => setForm(p => ({...p,change_category:e.target.value}))}>
                {Object.entries(CAT).map(([k,v]) => <option key={k} value={k}>{v}</option>)}
              </select>
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">Change Reason / Description *</label>
            <textarea className="form-textarea" rows="3" placeholder="Describe what changed and why..." value={form.change_reason} onChange={e => setForm(p => ({...p,change_reason:e.target.value}))} />
          </div>
          <label style={{ display:'flex', alignItems:'center', gap:8, fontSize:13, cursor:'pointer', fontWeight:600 }}>
            <input type="checkbox" checked={form.is_material} onChange={e => setForm(p => ({...p,is_material:e.target.checked}))} />
            Mark as material — flags model for re-validation under OSFI E-23 §4.3
          </label>
          <div>
            <button className="btn btn-primary btn-sm" onClick={submit} disabled={saving}>
              {saving ? <><Spinner /> Saving…</> : 'Save Change'}
            </button>
          </div>
        </div>
      )}

      {loading && <div className="spinner-center"><Spinner dark size={22} /></div>}
      {!loading && changes.length === 0 && (
        <div style={{ fontSize:13, color:'var(--text-muted)' }}>No changes logged yet. Use "Log Change" to track model version history per OSFI E-23 §4.2.</div>
      )}
      {!loading && changes.length > 0 && (
        <div className="change-timeline">
          {changes.map(c => (
            <div key={c.id} className={`change-item${c.requires_revalidation?' needs-reval':c.is_material?' is-material':''}`}>
              <div className="change-row">
                <span className="change-ver">{c.version_label}</span>
                <span className={`change-type-badge ct-${c.change_type}`}>{c.change_type}</span>
                {c.change_category && c.change_category !== 'other' && (
                  <span style={{ fontSize:11.5, color:'var(--text-muted)' }}>{CAT[c.change_category]||c.change_category}</span>
                )}
                <span className={`mat-chip ${c.is_material?'mat-yes':'mat-no'}`}>
                  {c.is_material ? 'Material' : 'Non-material'}
                </span>
                {c.requires_revalidation && <span className="mat-chip mat-yes">Re-validation Required</span>}
                <span style={{ marginLeft:'auto', fontSize:11.5, color:'var(--text-muted)' }}>
                  {c.changed_by_email} · {new Date(c.created_at).toLocaleDateString('en-CA')}
                </span>
              </div>
              <div style={{ fontSize:13 }}>{c.change_reason}</div>
              {c.ai_materiality && (
                <div className="ai-panel" style={{ marginTop:8, padding:'8px 12px' }}>
                  <div style={{ fontSize:12, fontWeight:700, color:'var(--navy)', marginBottom:4 }}>
                    AI Materiality Score: {c.ai_materiality.materiality_score}/100 · Urgency: {(c.ai_materiality.revalidation_urgency||'').replace(/_/g,' ')}
                  </div>
                  <div style={{ fontSize:12, color:'var(--text-muted)' }}>{c.ai_materiality.osfi_rationale}</div>
                  {c.ai_materiality.risk_implications?.length > 0 && (
                    <ul style={{ marginTop:6, paddingLeft:16 }}>
                      {c.ai_materiality.risk_implications.map((r,i) => (
                        <li key={i} style={{ fontSize:11.5, color:'var(--text-muted)' }}>{r}</li>
                      ))}
                    </ul>
                  )}
                </div>
              )}
              {!c.ai_materiality && (
                <button className="btn btn-ai btn-sm" style={{ marginTop:8 }} onClick={() => runAIMateriality(c)} disabled={aiLoading[c.id]}>
                  {aiLoading[c.id] ? <><Spinner /> Assessing…</> : '🧠 AI Materiality Check (OSFI §4.3)'}
                </button>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   PHASE 7 — ASSUMPTION REGISTER
═══════════════════════════════════════════════════ */
function AssumptionRegister({ modelId }) {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showForm, setShowForm] = useState(false);
  const [editId, setEditId] = useState(null);
  const blankForm = { assumption_name:'', current_value:'', prior_value:'', unit:'', approved_by:'', effective_date:'', change_reason:'' };
  const [form, setForm] = useState(blankForm);
  const [saving, setSaving] = useState(false);
  const toast = useToast();

  function reload() {
    apiFetch(`/api/models/${modelId}/assumptions`)
      .then(setItems).catch(e => toast(e.message,'error')).finally(() => setLoading(false));
  }
  useEffect(() => { reload(); }, [modelId]);

  function startEdit(a) { setEditId(a.id); setForm({ assumption_name:a.assumption_name, current_value:a.current_value, prior_value:a.prior_value||'', unit:a.unit||'', approved_by:a.approved_by||'', effective_date:a.effective_date||'', change_reason:a.change_reason||'' }); setShowForm(true); }
  function startAdd() { setEditId(null); setForm(blankForm); setShowForm(true); }

  async function save() {
    if (!form.assumption_name || !form.current_value) { toast('Name and current value are required','error'); return; }
    setSaving(true);
    try {
      if (editId) await apiFetch(`/api/models/${modelId}/assumptions/${editId}`, { method:'PUT', body:JSON.stringify(form) });
      else        await apiFetch(`/api/models/${modelId}/assumptions`, { method:'POST', body:JSON.stringify(form) });
      toast(editId ? 'Assumption updated' : 'Assumption added','success');
      setShowForm(false); reload();
    } catch(e) { toast(e.message,'error'); }
    finally { setSaving(false); }
  }

  async function del(id) {
    if (!confirm('Remove this assumption?')) return;
    await apiFetch(`/api/models/${modelId}/assumptions/${id}`, { method:'DELETE' });
    reload();
  }

  return (
    <div className="card" style={{ marginBottom:16 }}>
      <div className="section-hdr" style={{ marginBottom:items.length ? 12 : 0 }}>
        <div>
          <div className="section-title">Actuarial Assumption Register</div>
          <div style={{ fontSize:12, color:'var(--text-muted)', marginTop:2 }}>Key inputs that drive this model — versioned, approved, audit-ready</div>
        </div>
        <button className="btn btn-outline btn-sm" onClick={startAdd}>+ Add Assumption</button>
      </div>
      {loading ? <div className="spinner-center"><Spinner dark size={20}/></div> : items.length === 0 && !showForm ? (
        <div style={{ fontSize:13, color:'var(--text-muted)' }}>No assumptions recorded. Add the key parameters that govern this model's outputs (e.g. tail factors, discount rate, lapse rate).</div>
      ) : (
        <div>
          {items.length > 0 && (
            <div>
              <div style={{ display:'grid', gridTemplateColumns:'1.4fr 1fr 1fr 0.6fr auto auto', gap:8, padding:'4px 0 6px', borderBottom:'1px solid var(--border)', fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:'.5px', color:'var(--text-muted)' }}>
                <span>Assumption</span><span>Current Value</span><span>Prior Value</span><span>Unit</span><span>Approved By</span><span></span>
              </div>
              {items.map(a => (
                <div key={a.id} style={{ display:'grid', gridTemplateColumns:'1.4fr 1fr 1fr 0.6fr auto auto', gap:8, alignItems:'center', padding:'7px 0', borderBottom:'1px solid var(--border)', fontSize:13 }}>
                  <div>
                    <div className="assumption-name">{a.assumption_name}</div>
                    {a.change_reason && <div style={{ fontSize:11, color:'var(--text-muted)', marginTop:2 }}>{a.change_reason}</div>}
                  </div>
                  <div style={{ fontWeight:600 }}>{a.current_value}{a.unit ? <span className="assumption-unit" style={{ marginLeft:4 }}>{a.unit}</span> : null}</div>
                  <div className="assumption-prior">{a.prior_value || '—'}</div>
                  <div style={{ fontSize:11, color:'var(--text-muted)' }}>{a.unit || '—'}</div>
                  <div style={{ fontSize:11 }}>{a.approved_by || '—'}</div>
                  <div style={{ display:'flex', gap:4 }}>
                    <button className="btn btn-ghost btn-sm" style={{ padding:'2px 7px', fontSize:11 }} onClick={() => startEdit(a)}>Edit</button>
                    <button className="btn btn-ghost btn-sm" style={{ padding:'2px 7px', fontSize:11, color:'#b91c1c' }} onClick={() => del(a.id)}>×</button>
                  </div>
                </div>
              ))}
            </div>
          )}
          {showForm && (
            <div className="assumption-form">
              <div style={{ fontSize:12.5, fontWeight:700, marginBottom:10 }}>{editId ? 'Edit Assumption' : 'Add Assumption'}</div>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:10, marginBottom:10 }}>
                <div><label className="form-label">Assumption Name *</label><input className="form-control" placeholder="e.g. Tail Factor @ 60 months" value={form.assumption_name} onChange={e => setForm(p=>({...p,assumption_name:e.target.value}))}/></div>
                <div><label className="form-label">Current Value *</label><input className="form-control" placeholder="e.g. 1.025" value={form.current_value} onChange={e => setForm(p=>({...p,current_value:e.target.value}))}/></div>
                <div><label className="form-label">Prior Value</label><input className="form-control" placeholder="e.g. 1.018" value={form.prior_value} onChange={e => setForm(p=>({...p,prior_value:e.target.value}))}/></div>
                <div><label className="form-label">Unit</label><input className="form-control" placeholder="%, ratio, $" value={form.unit} onChange={e => setForm(p=>({...p,unit:e.target.value}))}/></div>
                <div><label className="form-label">Approved By</label><input className="form-control" placeholder="Name / title" value={form.approved_by} onChange={e => setForm(p=>({...p,approved_by:e.target.value}))}/></div>
                <div><label className="form-label">Effective Date</label><input className="form-control" type="date" value={form.effective_date} onChange={e => setForm(p=>({...p,effective_date:e.target.value}))}/></div>
              </div>
              <div style={{ marginBottom:10 }}><label className="form-label">Change Reason</label><textarea className="form-control" rows={2} placeholder="Why was this assumption set or changed?" value={form.change_reason} onChange={e => setForm(p=>({...p,change_reason:e.target.value}))}/></div>
              <div style={{ display:'flex', gap:8 }}>
                <button className="btn btn-primary btn-sm" onClick={save} disabled={saving}>{saving ? <Spinner/> : editId ? 'Update' : 'Add'}</button>
                <button className="btn btn-ghost btn-sm" onClick={() => setShowForm(false)}>Cancel</button>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   PHASE 7 — MODEL DEPENDENCY MAP
═══════════════════════════════════════════════════ */
function ModelDependencies({ modelId, allModels }) {
  const [deps, setDeps] = useState({ feeds_into:[], fed_by:[] });
  const [loading, setLoading] = useState(true);
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ direction:'upstream', other_model_id:'', dependency_type:'feeds_into', notes:'' });
  const [saving, setSaving] = useState(false);
  const toast = useToast();

  function reload() {
    apiFetch(`/api/models/${modelId}/dependencies`)
      .then(setDeps).catch(e => toast(e.message,'error')).finally(() => setLoading(false));
  }
  useEffect(() => { reload(); }, [modelId]);

  async function add() {
    if (!form.other_model_id) { toast('Select a model','error'); return; }
    setSaving(true);
    try {
      await apiFetch(`/api/models/${modelId}/dependencies`, { method:'POST', body:JSON.stringify(form) });
      toast('Dependency added','success'); setShowForm(false); reload();
    } catch(e) { toast(e.message,'error'); }
    finally { setSaving(false); }
  }

  async function del(depId) {
    await apiFetch(`/api/models/${modelId}/dependencies/${depId}`, { method:'DELETE' });
    reload();
  }

  const tierColor = { 1:'#b91c1c', 2:'#d97706', 3:'#15803d' };
  const available = (allModels||[]).filter(m => m.id !== modelId);

  return (
    <div className="card" style={{ marginBottom:16 }}>
      <div className="section-hdr" style={{ marginBottom: (deps.feeds_into.length || deps.fed_by.length) ? 12 : 0 }}>
        <div>
          <div className="section-title">Model Dependency Map</div>
          <div style={{ fontSize:12, color:'var(--text-muted)', marginTop:2 }}>Upstream/downstream cascade risk — a failure here propagates to linked models</div>
        </div>
        <button className="btn btn-outline btn-sm" onClick={() => setShowForm(!showForm)}>+ Link Model</button>
      </div>
      {loading ? <div className="spinner-center"><Spinner dark size={20}/></div> : (
        <div>
          {!deps.feeds_into.length && !deps.fed_by.length && !showForm && (
            <div style={{ fontSize:13, color:'var(--text-muted)' }}>No dependencies mapped. Link upstream models that provide inputs to this model, or downstream models that consume its outputs.</div>
          )}
          <div className="dep-map">
            <div>
              <div className="dep-column-label">⬆ This model feeds into</div>
              {deps.feeds_into.length === 0 ? <div style={{ fontSize:12, color:'var(--text-muted)' }}>None</div> : deps.feeds_into.map(d => (
                <div key={d.id} className="dep-item">
                  <span><span className="dep-arrow-up">→</span>{d.downstream_name}</span>
                  <div style={{ display:'flex', gap:6, alignItems:'center' }}>
                    {d.downstream_tier && <span style={{ fontSize:10, fontWeight:700, color: tierColor[d.downstream_tier] }}>T{d.downstream_tier}</span>}
                    <button style={{ background:'none', border:'none', cursor:'pointer', color:'#94a3b8', fontSize:14, lineHeight:1 }} onClick={() => del(d.id)} title="Remove link">×</button>
                  </div>
                </div>
              ))}
            </div>
            <div>
              <div className="dep-column-label">⬇ This model receives from</div>
              {deps.fed_by.length === 0 ? <div style={{ fontSize:12, color:'var(--text-muted)' }}>None</div> : deps.fed_by.map(d => (
                <div key={d.id} className="dep-item">
                  <span><span className="dep-arrow-down">←</span>{d.upstream_name}</span>
                  <div style={{ display:'flex', gap:6, alignItems:'center' }}>
                    {d.upstream_tier && <span style={{ fontSize:10, fontWeight:700, color: tierColor[d.upstream_tier] }}>T{d.upstream_tier}</span>}
                    <button style={{ background:'none', border:'none', cursor:'pointer', color:'#94a3b8', fontSize:14, lineHeight:1 }} onClick={() => del(d.id)} title="Remove link">×</button>
                  </div>
                </div>
              ))}
            </div>
          </div>
          {showForm && (
            <div className="dep-add-form" style={{ marginTop:12 }}>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1.5fr 1fr', gap:10, alignItems:'end' }}>
                <div>
                  <label className="form-label">Direction</label>
                  <select className="form-control" value={form.direction} onChange={e => setForm(p=>({...p,direction:e.target.value}))}>
                    <option value="upstream">This model feeds INTO selected</option>
                    <option value="downstream">Selected model feeds INTO this</option>
                  </select>
                </div>
                <div>
                  <label className="form-label">Linked Model</label>
                  <select className="form-control" value={form.other_model_id} onChange={e => setForm(p=>({...p,other_model_id:e.target.value}))}>
                    <option value="">— Select model —</option>
                    {available.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                  </select>
                </div>
                <div>
                  <label className="form-label">Dependency Type</label>
                  <select className="form-control" value={form.dependency_type} onChange={e => setForm(p=>({...p,dependency_type:e.target.value}))}>
                    <option value="feeds_into">Feeds Into (output → input)</option>
                    <option value="validates_against">Validates Against</option>
                    <option value="benchmarks">Benchmarks / Challenges</option>
                  </select>
                </div>
              </div>
              <div style={{ marginTop:8 }}>
                <input className="form-control" placeholder="Notes (optional)" value={form.notes} onChange={e => setForm(p=>({...p,notes:e.target.value}))}/>
              </div>
              <div style={{ display:'flex', gap:8, marginTop:10 }}>
                <button className="btn btn-primary btn-sm" onClick={add} disabled={saving}>{saving ? <Spinner/> : 'Add Link'}</button>
                <button className="btn btn-ghost btn-sm" onClick={() => setShowForm(false)}>Cancel</button>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════

function BacktestingLog({ validationId }) {

  const blankForm = { test_name:'', period_start:'', period_end:'', predicted_value:'', actual_value:'', tolerance_threshold:'', variance_pct:'', verdict:'pass', notes:'' };
  const [form, setForm] = useState(blankForm);
  const [saving, setSaving] = useState(false);
  const toast = useToast();

  function reload() {
    apiFetch(`/api/validations/${validationId}/backtesting`)
      .then(setLogs).catch(e => toast(e.message,'error')).finally(() => setLoading(false));
  }
  useEffect(() => { reload(); }, [validationId]);

  async function save() {
    if (!form.test_name) { toast('Test name is required','error'); return; }
    setSaving(true);
    try {
      await apiFetch(`/api/validations/${validationId}/backtesting`, { method:'POST', body:JSON.stringify(form) });

    <div style={{ marginBottom:14 }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8 }}>
        <span style={{ fontSize:12.5, fontWeight:700, color:'var(--navy)' }}>Backtesting Log</span>
        <button className="btn btn-outline btn-sm" onClick={() => setShowForm(!showForm)}>+ Add Test Result</button>
      </div>
      {loading ? <div className="spinner-center"><Spinner dark size={18}/></div> : (
        <>
          {logs.length === 0 && !showForm ? (
            <div style={{ fontSize:12.5, color:'var(--text-muted)', padding:'6px 0' }}>No backtesting results logged. Record predicted vs. actual comparisons to demonstrate model performance over time.</div>

            <div>
              {logs.length > 0 && (
                <div style={{ overflowX:'auto' }}>
                  <table style={{ width:'100%', fontSize:12.5, borderCollapse:'collapse' }}>

                        <th style={{ textAlign:'left', padding:'4px 6px' }}>Period</th>
                        <th style={{ textAlign:'right', padding:'4px 6px' }}>Predicted</th>
                        <th style={{ textAlign:'right', padding:'4px 6px' }}>Actual</th>
                        <th style={{ textAlign:'right', padding:'4px 6px' }}>Variance</th>
                        <th style={{ textAlign:'center', padding:'4px 6px' }}>Verdict</th>

                          <td style={{ padding:'6px', color:'var(--text-muted)' }}>{l.period_start ? `${l.period_start} → ${l.period_end||'?'}` : '—'}</td>
                          <td style={{ padding:'6px', textAlign:'right' }}>{l.predicted_value||'—'}</td>
                          <td style={{ padding:'6px', textAlign:'right' }}>{l.actual_value||'—'}</td>
                          <td style={{ padding:'6px', textAlign:'right' }}>{l.variance_pct != null ? `${l.variance_pct}%` : '—'}</td>
                          <td style={{ padding:'6px', textAlign:'center' }}>{verdictBadge(l.verdict)}</td>
                          <td style={{ padding:'6px' }}><button style={{ background:'none', border:'none', cursor:'pointer', color:'#94a3b8', fontSize:14 }} onClick={() => del(l.id)}>×</button></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>

                    <div><label className="form-label">Period Start</label><input className="form-control" type="date" value={form.period_start} onChange={e=>setForm(p=>({...p,period_start:e.target.value}))}/></div>

                    <div><label className="form-label">Predicted Value</label><input className="form-control" placeholder="e.g. $4.2M" value={form.predicted_value} onChange={e=>setForm(p=>({...p,predicted_value:e.target.value}))}/></div>
                    <div><label className="form-label">Actual Value</label><input className="form-control" placeholder="e.g. $3.9M" value={form.actual_value} onChange={e=>setForm(p=>({...p,actual_value:e.target.value}))}/></div>
                    <div><label className="form-label">Tolerance Threshold</label><input className="form-control" placeholder="e.g. ±5%" value={form.tolerance_threshold} onChange={e=>setForm(p=>({...p,tolerance_threshold:e.target.value}))}/></div>
                    <div><label className="form-label">Variance %</label><input className="form-control" type="number" step="0.01" placeholder="e.g. -7.14" value={form.variance_pct} onChange={e=>setForm(p=>({...p,variance_pct:e.target.value}))}/></div>
                    <div><label className="form-label">Verdict *</label>
                      <select className="form-control" value={form.verdict} onChange={e=>setForm(p=>({...p,verdict:e.target.value}))}>
                        <option value="pass">Pass</option>
                        <option value="fail">Fail</option>
                        <option value="inconclusive">Inconclusive</option>
                      </select>
                    </div>
                  </div>
                  <div style={{ marginBottom:10 }}><label className="form-label">Notes</label><textarea className="form-control" rows={2} placeholder="Methodology, caveats, OSFI implications..." value={form.notes} onChange={e=>setForm(p=>({...p,notes:e.target.value}))}/></div>
                  <div style={{ display:'flex', gap:8 }}>
                    <button className="btn btn-primary btn-sm" onClick={save} disabled={saving}>{saving ? <Spinner/> : 'Log Result'}</button>
                    <button className="btn btn-ghost btn-sm" onClick={()=>{setShowForm(false);setForm(blankForm);}}>Cancel</button>
                  </div>
                </div>
              )}
            </div>
          )}
        </>
      )}
    </div>
  );
}

function RatingWizard({ modelId, setScreen, setDetailModelId }) {
  const [step, setStep]       = useState(0);   // 0-4 MCQ, 5 booleans, 6 result
  const [answers, setAnswers] = useState({});
  const [flags, setFlags]     = useState({ regulatory_use: false, is_vendor: false, multi_business_unit: false });
  const [result, setResult]   = useState(null);
  const [submitting, setSubmitting] = useState(false);
  const toast = useToast();

  const totalDots = 7; // 5 MCQ + 1 flags + 1 result

  async function submit() {
    setSubmitting(true);
    try {
      const r = await apiFetch(`/api/models/${modelId}/rate`, {
        method: 'POST',
        body: JSON.stringify({ ...answers, ...flags }),
      });
      setResult(r);
      setStep(6);
    } catch (e) { toast(e.message, 'error'); }
    finally { setSubmitting(false); }
  }

  function goBack() {
    if (step === 0) { setDetailModelId(modelId); setScreen('model_detail'); }
    else setStep(p => p - 1);
  }

  const q = step < 5 ? MCQ[step] : null;

  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 20 }}>
        <button className="btn btn-ghost btn-sm" onClick={() => { setDetailModelId(modelId); setScreen('model_detail'); }}>× Cancel</button>
        <h2 style={{ fontSize: 16, fontWeight: 700 }}>Risk Rating Wizard</h2>
      </div>
      <div className="card">
        <div className="wizard-wrap">
          {/* Progress dots */}
          <div className="wizard-progress">
            {Array.from({ length: totalDots }, (_, i) => (
              <React.Fragment key={i}>
                {i > 0 && <div className={`wz-line${i <= step ? ' done' : ''}`} />}
                <div className={`wz-dot ${i < step ? 'done' : i === step ? 'active' : 'pending'}`}>
                  {i < step ? '✓' : i + 1}
                </div>
              </React.Fragment>
            ))}
          </div>

          {/* MCQ pages */}
          {step < 5 && q && (
            <div>
              <div className="wz-question">{q.label}</div>
              <div className="wz-sub">{q.sub}</div>
              {q.opts.map(o => (
                <div key={o.v} className={`wz-option${answers[q.key] === o.v ? ' selected' : ''}`} onClick={() => setAnswers(p => ({ ...p, [q.key]: o.v }))}>
                  <input type="radio" readOnly checked={answers[q.key] === o.v} />
                  <div>
                    <div className="wz-opt-label">{o.l}</div>
                    <div className="wz-opt-desc">{o.d}</div>
                  </div>
                </div>
              ))}
              <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 22 }}>
                <button className="btn btn-ghost" onClick={goBack}>← Back</button>
                <button className="btn btn-primary" disabled={answers[q.key] === undefined} onClick={() => setStep(p => p + 1)}>Next →</button>
              </div>
            </div>
          )}

          {/* Boolean flags page */}
          {step === 5 && (
            <div>
              <div className="wz-question">Additional Risk Flags</div>
              <div className="wz-sub">Select all flags that apply. Each flag increases the risk weight in the final tier calculation.</div>
              {BOOL_FLAGS.map(f => (
                <div key={f.key} className={`wz-option${flags[f.key] ? ' selected' : ''}`} onClick={() => setFlags(p => ({ ...p, [f.key]: !p[f.key] }))}>
                  <input type="checkbox" readOnly checked={!!flags[f.key]} />
                  <div>
                    <div className="wz-opt-label">{f.label}</div>
                    <div className="wz-opt-desc">{f.desc}</div>
                  </div>
                </div>
              ))}
              <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 22 }}>
                <button className="btn btn-ghost" onClick={() => setStep(4)}>← Back</button>
                <button className="btn btn-primary" onClick={submit} disabled={submitting}>
                  {submitting ? <><Spinner /> Calculating…</> : 'Calculate Rating →'}
                </button>
              </div>
            </div>
          )}

          {/* Result page */}
          {step === 6 && result && (
            <div className="result-center">
              <div className={`tier-big t${result.tier}`}>Tier {result.tier}</div>
              <div className="tier-score">Risk Score: {result.score} / 100</div>
              <div className="tier-next">📅 Next Validation Due: {result.next_validation_due || 'Review required'}</div>
              {result.ai_reasoning && (
                <div className="ai-panel" style={{ textAlign: 'left', marginBottom: 20 }}>
                  <div className="ai-panel-hdr"><span className="ai-icon">🧠</span>AI Reasoning</div>
                  <div className="ai-insight">{result.ai_reasoning}</div>
                </div>
              )}
              <button className="btn btn-primary" onClick={() => { setDetailModelId(modelId); setScreen('model_detail'); }}>
                View Model →
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}
