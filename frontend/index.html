/* ═══════════════════════════════════════════════════
   PHASE 5 — NATURAL LANGUAGE SEARCH
═══════════════════════════════════════════════════ */
function NaturalLanguageSearch({ setScreen, setDetailModelId }) {
  const [query, setQuery] = useState('');
  const [results, setResults] = useState(null);
  const [loading, setLoading] = useState(false);
  const toast = useToast();

  const suggestions = [
    'Tier 1 models overdue for validation',
    'Credit models that use vendor data',
    'Models with no validation in the last 2 years',
    'Models flagged for re-validation',
    'All regulatory models',
    'ML models with high decision volume',
  ];

  async function search(q) {
    const term = q || query;
    if (!term.trim()) return;
    setQuery(term); setLoading(true); setResults(null);
    try {
      const r = await apiFetch(`/api/search?q=${encodeURIComponent(term)}`);
      setResults(r);
    } catch(e) { toast(e.message,'error'); }
    finally { setLoading(false); }
  }

  return (
    <div>
      <div className="card" style={{ marginBottom:18 }}>
        <div style={{ marginBottom:12 }}>
          <div className="section-title" style={{ marginBottom:4 }}>Natural Language Model Search</div>
          <div style={{ fontSize:13, color:'var(--text-muted)' }}>Ask in plain English. Claude searches your inventory and explains what it found.</div>
        </div>
        <div className="nls-bar">
          <input
            className="nls-input"
            placeholder='e.g. "show me all Tier 1 credit models overdue for validation"'
            value={query}
            onChange={e => setQuery(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && search()}
          />
          <button className="btn btn-primary" onClick={() => search()} disabled={loading || !query.trim()}>
            {loading ? <Spinner /> : 'Search'}
          </button>
        </div>
        <div className="nls-suggestion">
          Try: {suggestions.map((s,i) => (
            <span key={i} onClick={() => search(s)}>{s}</span>
          ))}
        </div>
      </div>

      {loading && <div className="card"><div className="spinner-center"><Spinner dark size={24} /></div></div>}

      {results && (
        <div className="card">
          {results.interpretation && (
            <div className="nls-interpretation">
              🧠 {results.interpretation}
            </div>
          )}
          {results.search_explanation && (
            <div style={{ fontSize:12, color:'var(--text-muted)', marginBottom:12 }}>{results.search_explanation}</div>
          )}
          {results.total_matched === 0 ? (
            <div className="empty-state"><div>No models matched "{results.query}"</div></div>
          ) : (
            <div className="table-wrap">
              <div style={{ fontSize:12, color:'var(--text-muted)', marginBottom:8 }}>{results.total_matched} model{results.total_matched!==1?'s':''} matched</div>
              <table>
                <thead><tr><th>Name</th><th>Type</th><th>Tier</th><th>Owner</th><th>Next Validation</th><th></th></tr></thead>
                <tbody>
                  {results.results.map(m => (
                    <tr key={m.id}>
                      <td><strong>{m.name}</strong></td>
                      <td>{(m.model_type||'').replace(/_/g,' ')}</td>
                      <td><TierBadge tier={m.risk_tier} /></td>
                      <td>{m.model_owner || '—'}</td>
                      <td style={{ fontSize:13 }}>{m.next_validation_due || '—'}</td>
                      <td>
                        <button className="btn btn-ghost btn-sm" onClick={() => { setDetailModelId(m.id); setScreen('model_detail'); }}>View</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   PHASE 5 — DOCUMENT INTELLIGENCE
═══════════════════════════════════════════════════ */
function DocumentIntelligence({ setScreen, setEditModelId }) {
  const [docText, setDocText] = useState('');
  const [docType, setDocType] = useState('');
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const toast = useToast();

  async function ingest() {
    if (docText.trim().length < 50) { toast('Please paste at least a paragraph of text','error'); return; }
    setLoading(true); setResult(null);
    try {
      const r = await apiFetch('/api/ai/ingest-document', { method:'POST', body: JSON.stringify({ document_text:docText, document_type:docType }) });
      setResult(r);
    } catch(e) { toast(e.message,'error'); }
    finally { setLoading(false); }
  }

  function confClass(c) {
    if (c === 'high') return { color:'var(--green)', fontWeight:700 };
    if (c === 'medium') return { color:'var(--amber)', fontWeight:700 };
    return { color:'var(--red)', fontWeight:700 };
  }

  function useModelData() {
    if (!result?.extracted_model_data) return;
    const d = result.extracted_model_data;
    sessionStorage.setItem('prefill_model', JSON.stringify({
      name: d.name||'',
      model_type: d.model_type||'',
      purpose: d.model_purpose||'',
      methodology: d.methodology||'',
      input_data_sources: d.data_sources||'',
      primary_output: d.primary_output||'',
      model_owner_name: d.model_owner||'',
      is_vendor_model: !!d.vendor_name,
      vendor_name: d.vendor_name||'',
    }));
    setEditModelId(null);
    setScreen('model_form');
    toast('Form pre-filled from document','success');
  }

  return (
    <div>
      <div className="card" style={{ marginBottom:18 }}>
        <div className="section-title" style={{ marginBottom:6 }}>Document Intelligence</div>
        <div style={{ fontSize:13, color:'var(--text-muted)', marginBottom:16 }}>
          Paste text from any MRM document — validation report, model development document, vendor assessment, policy — and Claude will extract structured data and pre-fill your forms.
          <br /><strong style={{ color:'var(--navy)' }}>Eliminates hours of manual re-keying.</strong>
        </div>
        <div className="form-group" style={{ marginBottom:12 }}>
          <label className="form-label">Document Type (optional hint)</label>
          <select className="form-select" value={docType} onChange={e => setDocType(e.target.value)} style={{ maxWidth:260 }}>
            <option value="">Auto-detect</option>
            <option value="validation_report">Validation Report</option>
            <option value="model_development_doc">Model Development Document</option>
            <option value="vendor_assessment">Vendor Assessment</option>
            <option value="mra_policy">MRM / MRA Policy</option>
            <option value="osfi_letter">OSFI Letter / Correspondence</option>
          </select>
        </div>
        <div className="di-drop">
          <textarea
            style={{ width:'100%', minHeight:200, border:'none', background:'transparent', outline:'none', resize:'vertical', fontSize:13, lineHeight:1.6 }}
            placeholder="Paste document text here… (copy from Word, PDF, or any document)"
            value={docText}
            onChange={e => setDocText(e.target.value)}
          />
        </div>
        <div style={{ marginTop:12, display:'flex', gap:10, alignItems:'center' }}>
          <button className="btn btn-primary" onClick={ingest} disabled={loading || docText.trim().length < 50}>
            {loading ? <><Spinner /> Extracting…</> : 'Extract with AI'}
          </button>
          {docText && <button className="btn btn-ghost btn-sm" onClick={() => { setDocText(''); setResult(null); }}>Clear</button>}
          <span style={{ fontSize:12, color:'var(--text-muted)' }}>{docText.length} characters · powered by Claude Sonnet</span>
        </div>
      </div>

      {loading && (
        <div className="card" style={{ textAlign:'center', padding:40 }}>
          <Spinner dark size={26} />
          <div style={{ marginTop:14, color:'var(--text-muted)', fontSize:13 }}>Claude is reading your document and extracting structured MRM data…</div>
        </div>
      )}

      {result && (
        <div>
          <div className="card" style={{ marginBottom:14 }}>
            <div className="section-hdr" style={{ marginBottom:12 }}>
              <div>
                <div className="section-title">Extraction Results</div>
                <div style={{ fontSize:12, color:'var(--text-muted)' }}>
                  Document type: <strong>{(result.document_type_detected||'').replace(/_/g,' ')}</strong> ·
                  Confidence: <span style={confClass(result.confidence)}>{result.confidence}</span>
                </div>
              </div>
            </div>
            {result.summary && (
              <div className="ai-panel" style={{ marginBottom:14 }}>
                <div className="ai-panel-hdr"><span className="ai-icon">🧠</span>Summary</div>
                <div className="ai-insight">{result.summary}</div>
              </div>
            )}
            {result.suggested_next_action && (
              <div style={{ padding:'10px 14px', background:'#eff6ff', borderRadius:8, fontSize:13, color:'#1d4ed8', marginBottom:14 }}>
                <strong>Suggested Action:</strong> {result.suggested_next_action}
              </div>
            )}
          </div>

          {result.extracted_model_data && Object.values(result.extracted_model_data).some(v=>v) && (
            <div className="di-result-section" style={{ marginBottom:12 }}>
              <div className="di-result-title">Extracted Model Data</div>
              {Object.entries(result.extracted_model_data).filter(([,v])=>v).map(([k,v]) => (
                <div key={k} className="di-field">
                  <span className="di-field-label">{k.replace(/_/g,' ')}</span>
                  <span className="di-field-value">{String(v)}</span>
                </div>
              ))}
              <div className="di-action-btn">
                <button className="btn btn-primary btn-sm" onClick={useModelData}>Use to Pre-fill Add Model Form</button>
              </div>
            </div>
          )}

          {result.extracted_validation_data && Object.values(result.extracted_validation_data).some(v=>v) && (
            <div className="di-result-section" style={{ marginBottom:12 }}>
              <div className="di-result-title">Extracted Validation Data</div>
              {Object.entries(result.extracted_validation_data).filter(([,v])=>v).map(([k,v]) => (
                <div key={k} className="di-field">
                  <span className="di-field-label">{k.replace(/_/g,' ')}</span>
                  <span className="di-field-value">{String(v)}</span>
                </div>
              ))}
            </div>
          )}

          {(result.osfi_sections_referenced||[]).length > 0 && (
            <div className="di-result-section" style={{ marginBottom:12 }}>
              <div className="di-result-title">OSFI Sections Referenced</div>
              <div style={{ display:'flex', gap:8, flexWrap:'wrap', marginTop:4 }}>
                {result.osfi_sections_referenced.map((s,i) => (
                  <span key={i} style={{ padding:'3px 10px', background:'#eff6ff', borderRadius:20, fontSize:12, fontWeight:700, color:'#1d4ed8' }}>{s}</span>
                ))}
              </div>
            </div>
          )}

          {(result.key_dates||[]).length > 0 && (
            <div className="di-result-section" style={{ marginBottom:12 }}>
              <div className="di-result-title">Key Dates Found</div>
              {result.key_dates.map((d,i) => (
                <div key={i} className="di-field">
                  <span className="di-field-label">{d.label}</span>
                  <span className="di-field-value" style={{ fontWeight:700 }}>{d.date}</span>
                </div>
              ))}
            </div>
          )}

          {(result.data_quality_warnings||[]).length > 0 && (
            <div className="di-result-section">
              <div className="di-result-title">Data Quality Warnings</div>
              {result.data_quality_warnings.map((w,i) => (
                <div key={i} className="di-warning">{w}</div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function AppShell({ user: userProp }) {

  const [screen, setScreen]               = useState('dashboard');
  const [detailModelId, setDetailModelId] = useState(null);
  const [editModelId, setEditModelId]     = useState(null);
  const [rateModelId, setRateModelId]     = useState(null);

  // Fetch full user profile (needed for tenant_id in AdminPanel)
  useEffect(() => {
    apiFetch('/api/me').then(d => {

  function renderScreen() {
    switch (screen) {

      case 'model_detail': return <ModelDetail modelId={detailModelId} setScreen={setScreen} setEditModelId={setEditModelId} setRateModelId={setRateModelId} />;
      case 'rate_wizard':  return <RatingWizard modelId={rateModelId} setScreen={setScreen} setDetailModelId={setDetailModelId} />;

      case 'mrm_policy':      return <MRMPolicyGenerator />;

  return (

        </div>

/* ── Session Timeout Guard ── */
const IDLE_WARN_MS   = 15 * 60 * 1000; // 15 min → show warning
const IDLE_LOGOUT_MS = 20 * 60 * 1000; // 20 min → auto-logout

function SessionGuard() {
  const [idleSecs, setIdleSecs] = useState(0);
  const [showWarn, setShowWarn] = useState(false);
  const lastActivity = useRef(Date.now());

  useEffect(() => {
    function resetActivity() { lastActivity.current = Date.now(); setShowWarn(false); }
    const events = ['mousedown','keydown','scroll','touchstart','click'];
    events.forEach(ev => document.addEventListener(ev, resetActivity, { passive:true }));

    const ticker = setInterval(() => {
      const idle = Date.now() - lastActivity.current;
      if (idle >= IDLE_LOGOUT_MS) {
        clearToken();
        window.location.reload();
      } else if (idle >= IDLE_WARN_MS) {
        setShowWarn(true);
        setIdleSecs(Math.floor((IDLE_LOGOUT_MS - idle) / 1000));
      } else {
        setShowWarn(false);
      }
    }, 5000);

    return () => {
      clearInterval(ticker);
      events.forEach(ev => document.removeEventListener(ev, resetActivity));
    };
  }, []);

  if (!showWarn) return null;

  return (
    <div className="session-warn-overlay">
      <div className="session-warn-box">
        <div className="session-warn-icon">⏱️</div>
        <div className="session-warn-title">Session Expiring Soon</div>
        <div className="session-warn-body">
          For security, ClearMRM automatically signs you out after 20 minutes of inactivity. Your work is saved.
        </div>
        <div className="session-warn-timer">{idleSecs}s</div>
        <button className="btn btn-primary" style={{ width:'100%' }} onClick={() => { lastActivity.current = Date.now(); setShowWarn(false); }}>
          Stay Signed In
        </button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════════ */
function parseJwtPayload(token) {
  try {
    return JSON.parse(atob(token.split('.')[1]));
  } catch { return {}; }
}

function App() {
  const [user, setUser] = useState(() => {
    // Handle SSO callback: token or error in URL hash
    const hash = window.location.hash;
    if (hash.includes('sso-token=')) {
      const token = hash.split('sso-token=')[1];
      storeToken(token);
      window.history.replaceState(null, '', window.location.pathname);
      const p = parseJwtPayload(token);
      return { email: p.email || p.sub || '', tenant_name: p.tenant_name || p.tenant || 'ClearMRM' };
    }
    if (hash.includes('sso-error=')) {
      const err = decodeURIComponent(hash.split('sso-error=')[1]);
      window.history.replaceState(null, '', window.location.pathname);
      // Will show error via toast after mount — store in sessionStorage for display
      sessionStorage.setItem('sso_error', err);
    }
    const token = getToken();
    if (!token) return null;
    const p = parseJwtPayload(token);
    return { email: p.email || p.sub || '', tenant_name: p.tenant_name || p.tenant || 'ClearMRM' };
  });
  const [showOnboarding, setShowOnboarding] = useState(false);

  useEffect(() => {
    const ssoErr = sessionStorage.getItem('sso_error');
    if (ssoErr) {
      sessionStorage.removeItem('sso_error');
      // Toast won't be available until rendered — show alert fallback
      alert('SSO sign-in failed: ' + ssoErr);
    }
  }, []);

  function handleLogin(data) {
    const p = parseJwtPayload(data.token);
    setUser({ email: p.email || p.sub || '', tenant_name: p.tenant_name || p.tenant || 'ClearMRM' });
  }

  if (showOnboarding) return <ToastProvider><OnboardingScreen onBack={() => setShowOnboarding(false)} /></ToastProvider>;

  return (
    <ToastProvider>
      {user
        ? <AppShell user={user} />
        : <LandingPage onLogin={handleLogin} onGetStarted={() => setShowOnboarding(true)} />
      }
    </ToastProvider>
  );
}

const rootEl = document.getElementById('root');
ReactDOM.createRoot(rootEl).render(<App />);
</script>
