const WF_STATES = ['requested', 'assigned', 'in_progress', 'findings_submitted', 'approved', 'closed'];

function WorkflowStates({ current }) {
  return (
    <div className="wf-states">
      {WF_STATES.map((s, i) => (
        <React.Fragment key={s}>
          {i > 0 && <span className="wf-arrow">→</span>}
          <span className={`wf-state${current === s ? ' active' : ''}`}>{s.replace(/_/g, ' ')}</span>
        </React.Fragment>
      ))}
    </div>
  );
}

function Validations() {
  const [vals, setVals]     = useState([]);
  const [models, setModels] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showCreate, setShowCreate] = useState(false);
  const [selected, setSelected]     = useState(null);
  const toast = useToast();

  function load() {
    setLoading(true);
    Promise.all([apiFetch('/api/validations'), apiFetch('/api/models')])
      .then(([v, m]) => { setVals(v || []); setModels(m || []); })
      .catch(e => toast(e.message, 'error'))
      .finally(() => setLoading(false));
  }
  useEffect(() => { load(); }, []);

  return (
    <div>
      <div className="section-hdr">
        <div>
          <div className="section-title">Validations</div>
          <WorkflowStates current={null} />
        </div>
        <button className="btn btn-primary" onClick={() => setShowCreate(true)}>+ Request Validation</button>
      </div>
      <div className="card">
        {loading ? (
          <div className="spinner-center"><Spinner dark size={26} /></div>
        ) : vals.length === 0 ? (
          <div className="empty-state"><div className="empty-icon">✅</div>No validations yet.</div>
        ) : (
          <div className="table-wrap">
            <table>
              <thead>
                <tr><th>Model</th><th>Type</th><th>Status</th><th>Assigned To</th><th>Due Date</th><th>Outcome</th></tr>
              </thead>
              <tbody>
                {vals.map(v => (
                  <tr key={v.id} style={{ cursor: 'pointer' }} onClick={() => setSelected(v)}>
                    <td><strong>{v.model_name}</strong></td>
                    <td>{(v.validation_type || '').replace(/_/g, ' ')}</td>
                    <td><StatusBadge status={v.status} /></td>
                    <td>{v.assigned_to || '—'}</td>
                    <td style={{ fontSize: 13 }}>{v.due_date || '—'}</td>

                  </tr>

              </tbody>
            </table>

      </div>
      {showCreate && <CreateValModal models={models} onClose={() => setShowCreate(false)} onCreated={() => { setShowCreate(false); load(); }} />}
      {selected && <ValDetailModal val={selected} onClose={() => { setSelected(null); load(); }} />}
    </div>
  );
}

function CreateValModal({ models, onClose, onCreated }) {
  const [form, setForm] = useState({ model_id: '', validation_type: 'full', scope: '', due_date: '' });
  const [saving, setSaving] = useState(false);
  const [aiResult, setAiResult] = useState(null);
  const toast = useToast();
  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));

  async function handleSubmit(e) {
    e.preventDefault(); setSaving(true);
    try {
      const r = await apiFetch('/api/validations', { method: 'POST', body: JSON.stringify(form) });
      if (r?.pre_assessment) { setAiResult(r.pre_assessment); }
      else { toast('Validation requested', 'success'); onCreated(); }
    } catch (e) { toast(e.message, 'error'); setSaving(false); }
  }

  if (aiResult) return (
    <Modal title="Validation Requested" onClose={onCreated} footer={<button className="btn btn-primary" onClick={onCreated}>Done</button>}>
      <div className="alert alert-success">Validation request submitted successfully.</div>
      <div className="ai-panel">
        <div className="ai-panel-hdr"><span className="ai-icon">🧠</span>AI Pre-Assessment</div>
        <div className="ai-insight">{aiResult}</div>
      </div>
    </Modal>
  );

  return (
    <Modal title="Request Validation" onClose={onClose}
      footer={
        <>
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" form="cv-form" type="submit" disabled={saving}>
            {saving ? <><Spinner /> Submitting…</> : 'Submit Request'}
          </button>
        </>
      }>
      <form id="cv-form" onSubmit={handleSubmit}>
        <div className="form-grid">
          <div className="form-group full">
            <label className="form-label">Model *</label>
            <select className="form-control" value={form.model_id} onChange={e => set('model_id', e.target.value)} required>
              <option value="">Select a model…</option>
              {models.map(m => <option key={m.id} value={m.id}>{m.name} v{m.version}</option>)}
            </select>
          </div>
          <div className="form-group">
            <label className="form-label">Validation Type</label>
            <select className="form-control" value={form.validation_type} onChange={e => set('validation_type', e.target.value)}>
              <option value="full">Full Validation</option>
              <option value="targeted">Targeted</option>
              <option value="monitoring">Monitoring</option>
            </select>
          </div>
          <div className="form-group">
            <label className="form-label">Due Date</label>
            <input className="form-control" type="date" value={form.due_date} onChange={e => set('due_date', e.target.value)} />
          </div>
          <div className="form-group full">
            <label className="form-label">Scope</label>
            <textarea className="form-control" rows={3} value={form.scope} onChange={e => set('scope', e.target.value)} placeholder="Describe the scope and objectives of this validation…" />
          </div>
        </div>
      </form>
    </Modal>
  );
}

function ValDetailModal({ val: initialVal, onClose }) {
  const [v, setV]                 = useState(initialVal);
  const [actionData, setAD]       = useState({});
  const [saving, setSaving]       = useState(false);
  const [aiAnalysis, setAiAnalysis]   = useState(v.ai_findings_analysis || null);
  const [aiApprCheck, setAiApprCheck] = useState(v.ai_approval_check || null);
  const [aiClosure, setAiClosure]     = useState(v.ai_closure_summary ? { summary: v.ai_closure_summary } : null);
  const [aiLoading, setAiLoading]     = useState({ analyze: false, check: false, closure: false });
  const toast = useToast();
  const setA = (k, x) => setAD(p => ({ ...p, [k]: x }));

  async function runAI(type) {
    setAiLoading(p => ({ ...p, [type]: true }));
    try {
      const pathMap = { analyze: 'ai-analyze', check: 'ai-approve-check', closure: 'ai-closure-summary' };
      const r = await apiFetch(`/api/validations/${v.id}/${pathMap[type]}`, { method: 'POST' });
      if (type === 'analyze') setAiAnalysis(r);
      else if (type === 'check') setAiApprCheck(r);
      else setAiClosure(r);
      toast('AI analysis complete', 'success');
    } catch(e) { toast(e.message, 'error'); }
    finally { setAiLoading(p => ({ ...p, [type]: false })); }
  }

  async function doAction(action, extra = {}) {
    setSaving(true);
    try {
      const r = await apiFetch(`/api/validations/${v.id}`, {
        method: 'PUT',
        body: JSON.stringify({ action, ...extra }),
      });
      if (r) setV(r);
      toast('Validation updated', 'success');
    } catch (e) { toast(e.message, 'error'); }
    finally { setSaving(false); }
  }

  return (
    <Modal title="Validation Detail" onClose={onClose} footer={<button className="btn btn-ghost" onClick={onClose}>Close</button>}>

      <div className="detail-grid">

      {(v.ai_pre_assessment || v.pre_assessment) && (
        <div className="ai-panel" style={{ marginBottom: 14 }}>
          <div className="ai-panel-hdr"><span className="ai-icon">🧠</span>AI Pre-Assessment</div>

      {(v.status === 'approved' || v.status === 'closed' || aiClosure) && (
        <div style={{ marginBottom: 14 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
            <span style={{ fontSize: 12.5, fontWeight: 700, color: 'var(--navy)' }}>AI Audit Closure Summary</span>

            </button>
          </div>
          {aiClosure && (
            <div className="ai-panel">
              <div className="ai-panel-hdr"><span className="ai-icon">🧠</span>Audit Closure Narrative (OSFI E-23 §4.4)</div>

            </div>
          )}

      )}

      {/* Action areas */}
      {v.status === 'requested' && (
        <div style={{ background: 'var(--bg)', borderRadius: 8, padding: 16, marginTop: 12 }}>
          <div style={{ fontWeight: 700, marginBottom: 10 }}>Assign Validator</div>

              {saving ? <Spinner /> : 'Assign'}

          </div>
        </div>
      )}
      {v.status === 'assigned' && (
        <div style={{ marginTop: 12 }}>
          <button className="btn btn-primary" onClick={() => doAction('start')} disabled={saving}>
            {saving ? <Spinner /> : 'Start Validation'}

        </div>

      {v.status === 'in_progress' && (
        <div style={{ background: 'var(--bg)', borderRadius: 8, padding: 16, marginTop: 12 }}>
          <div style={{ fontWeight: 700, marginBottom: 12 }}>Submit Findings</div>
          <div className="form-group" style={{ marginBottom: 12 }}>
            <label className="form-label">Findings</label>
            <textarea className="form-control" rows={4} value={actionData.findings || ''} onChange={e => setA('findings', e.target.value)} placeholder="Describe findings from the validation…" />

          <div className="form-group" style={{ marginBottom: 12 }}>

          {(actionData.outcome === 'conditional_pass' || actionData.outcome === 'fail') && (
            <div className="form-group" style={{ marginBottom: 12 }}>

              <textarea className="form-control" rows={3} value={actionData.conditions || ''} onChange={e => setA('conditions', e.target.value)} placeholder="Specify required conditions or remediation actions…" />

        </div>
      )}
      {v.status === 'findings_submitted' && (
        <div style={{ marginTop: 12 }}>
          <button className="btn btn-success" onClick={() => doAction('approve')} disabled={saving}>

      {v.status === 'approved' && (
        <div style={{ marginTop: 12 }}>
          <button className="btn btn-ghost" onClick={() => doAction('close')} disabled={saving}>
            {saving ? <Spinner /> : 'Close Validation'}

        </div>
      )}

  );
}

/* ═══════════════════════════════════════════════════
   CSV IMPORT
═══════════════════════════════════════════════════ */
function CsvImport() {
  const [file, setFile]   = useState(null);
  const [drag, setDrag]   = useState(false);
  const [loading, setLoading] = useState(false);
  const [result, setResult]   = useState(null);
  const fileRef = useRef();
  const toast = useToast();

  function handleFile(f) {
    if (!f) return;
    if (!f.name.toLowerCase().endsWith('.csv')) { toast('Please select a .csv file', 'error'); return; }
    setFile(f); setResult(null);
  }

  async function handleUpload() {
    if (!file) return;
    setLoading(true);
    try {
      const fd = new FormData();
      fd.append('file', file);
      const token = getToken();
      const res = await fetch('/api/models/import', {
        method: 'POST',
        headers: { ...(token ? { Authorization: `Bearer ${token}` } : {}) },
        body: fd,
      });
      if (res.status === 401 || res.status === 403) { clearToken(); window.location.reload(); return; }
      if (!res.ok) { const e = await res.json().catch(() => ({ message: `HTTP ${res.status}` })); throw new Error(e.message); }
      const r = await res.json();
      setResult(r);
      setFile(null);
      toast(`Imported ${r.imported} model(s)`, 'success');
    } catch (e) { toast(e.message, 'error'); }
    finally { setLoading(false); }
  }

  return (
    <div>
      <div className="section-title" style={{ marginBottom: 16 }}>Import Models from CSV</div>
      <div className="card" style={{ maxWidth: 560 }}>
        <div
          className={`import-zone${drag ? ' drag-over' : ''}`}
          onClick={() => fileRef.current.click()}
          onDragOver={e => { e.preventDefault(); setDrag(true); }}
          onDragLeave={() => setDrag(false)}
          onDrop={e => { e.preventDefault(); setDrag(false); handleFile(e.dataTransfer.files[0]); }}>
          <div className="import-icon">📥</div>
          <div style={{ fontWeight: 600, fontSize: 15 }}>
            {file ? file.name : 'Drop a CSV file here, or click to browse'}
          </div>
          <div className="import-hint">
            Supported columns: name, version, business_unit, model_owner_name, methodology_type, is_third_party, vendor_name
          </div>
          <input ref={fileRef} type="file" accept=".csv" style={{ display: 'none' }} onChange={e => handleFile(e.target.files[0])} />
        </div>
        {file && (
          <div style={{ marginTop: 14 }}>
            <button className="btn btn-primary" onClick={handleUpload} disabled={loading}>
              {loading ? <><Spinner /> Importing…</> : `Import ${file.name}`}
            </button>
          </div>
        )}
        {result && (
          <div style={{ marginTop: 16 }}>
            <div className="alert alert-success">✓ Imported <strong>{result.imported}</strong> model(s) successfully.</div>
            {result.skipped > 0 && <div className="alert alert-warning">⚠️ {result.skipped} row(s) skipped (duplicates or invalid data).</div>}
            {result.errors?.length > 0 && (
              <div className="alert alert-danger">
                <strong>Errors encountered:</strong>
                <ul style={{ marginTop: 6, paddingLeft: 16 }}>
                  {result.errors.map((err, i) => <li key={i} style={{ fontSize: 13 }}>{err}</li>)}
                </ul>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   ONBOARDING SCREEN (pre-login)
═══════════════════════════════════════════════════ */
function OnboardingScreen({ onBack }) {
  const [step, setStep] = useState(1);
  const [form, setForm] = useState({
    institution_name: '', institution_type: '', asset_size_tier: '',
    contact_name: '', contact_email: '', password: '', confirm_password: '',
  });
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState('');
  const [done, setDone] = useState(false);
  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));

  async function handleSubmit(e) {
    e.preventDefault();
    if (form.password !== form.confirm_password) { setError('Passwords do not match.'); return; }
    setSaving(true); setError('');
    try {
      await fetch('/api/onboarding/register', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(form),
      }).then(async r => {
        const d = await r.json();
        if (!r.ok) throw new Error(d.error || 'Registration failed');
        return d;
      });
      setDone(true);
    } catch(e) { setError(e.message); }
    finally { setSaving(false); }
  }

  if (done) return (
    <div className="onboard-page">
      <div className="onboard-card" style={{ textAlign: 'center', padding: '48px 36px' }}>
        <div style={{ fontSize: 52, marginBottom: 16 }}>🎉</div>
        <div style={{ fontSize: 20, fontWeight: 800, marginBottom: 8, color: 'var(--navy)' }}>Account Created!</div>
        <div style={{ fontSize: 14, color: 'var(--text-muted)', marginBottom: 28, lineHeight: 1.7 }}>
          Your ClearMRM account for <strong>{form.institution_name}</strong> is ready. We've seeded 3 demo models so you can explore immediately.
        </div>
        <div className="alert alert-success" style={{ textAlign: 'left', marginBottom: 20 }}>✓ Tenant provisioned · 3 demo models seeded · Sign in now to start your OSFI E-23 inventory</div>
        <button className="btn btn-primary" style={{ width: '100%', padding: '12px', fontSize: 15 }} onClick={onBack}>
          Sign In to ClearMRM →
        </button>
      </div>
    </div>
  );

  return (
    <div className="onboard-page">
      <div className="onboard-card">
        <div style={{ textAlign: 'center', marginBottom: 20 }}>
          <div className="brand" style={{ fontSize: 24, marginBottom: 6 }}>Clear<span style={{ color: '#f97316' }}>MRM</span></div>
          <div style={{ fontSize: 13, color: 'var(--text-muted)' }}>OSFI E-23 Model Risk Management — Institution Registration</div>
        </div>
        <div className="onboard-steps">
          {[1, 2].map((s, i) => (
            <React.Fragment key={s}>
              {i > 0 && <div className="onboard-line" />}
              <div className={`onboard-step ${step > s ? 'done' : step === s ? 'active' : ''}`}>{step > s ? '✓' : s}</div>
            </React.Fragment>
          ))}
        </div>
        {error && <div className="alert alert-danger" style={{ marginBottom: 14 }}>{error}</div>}
        <form onSubmit={handleSubmit}>
          {step === 1 && (
            <div>
              <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 16, color: 'var(--navy)' }}>Institution Details</div>
              <div className="form-group" style={{ marginBottom: 14 }}>
                <label className="form-label">Institution Name *</label>
                <input className="form-control" value={form.institution_name} onChange={e => set('institution_name', e.target.value)} placeholder="e.g. ATB Financial" required />
              </div>
              <div className="form-group" style={{ marginBottom: 14 }}>
                <label className="form-label">Institution Type *</label>
                <select className="form-control" value={form.institution_type} onChange={e => set('institution_type', e.target.value)} required>
                  <option value="">Select type…</option>
                  <option value="bank">Bank (Schedule I/II/III)</option>
                  <option value="trust">Trust Company</option>
                  <option value="insurance">Federal Insurance Company</option>
                  <option value="credit_union">Credit Union / Caisse Populaire</option>
                  <option value="other">Other FRFI</option>
                </select>
              </div>
              <div className="form-group" style={{ marginBottom: 20 }}>
                <label className="form-label">Asset Size Tier</label>
                <select className="form-control" value={form.asset_size_tier} onChange={e => set('asset_size_tier', e.target.value)}>
                  <option value="">Select size…</option>
                  <option value="community">Community (Under $1B assets)</option>
                  <option value="regional">Regional ($1B–$20B assets)</option>
                  <option value="national">National ($20B–$100B assets)</option>
                  <option value="enterprise">Enterprise (Over $100B assets)</option>
                </select>
              </div>
              <button type="button" className="btn btn-primary" style={{ width: '100%', padding: '11px' }} disabled={!form.institution_name || !form.institution_type} onClick={() => setStep(2)}>
                Next →
              </button>
            </div>
          )}
          {step === 2 && (
            <div>
              <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 16, color: 'var(--navy)' }}>Primary Contact & Credentials</div>
              <div className="form-group" style={{ marginBottom: 14 }}>
                <label className="form-label">Contact Name *</label>
                <input className="form-control" value={form.contact_name} onChange={e => set('contact_name', e.target.value)} placeholder="Chief Risk Officer" required />
              </div>
              <div className="form-group" style={{ marginBottom: 14 }}>
                <label className="form-label">Email Address *</label>
                <input className="form-control" type="email" value={form.contact_email} onChange={e => set('contact_email', e.target.value)} placeholder="cro@institution.ca" required />
              </div>
              <div className="form-group" style={{ marginBottom: 14 }}>
                <label className="form-label">Password *</label>
                <input className="form-control" type="password" value={form.password} onChange={e => set('password', e.target.value)} placeholder="Min 8 chars, uppercase, number, special char" required />
              </div>
              <div className="form-group" style={{ marginBottom: 20 }}>
                <label className="form-label">Confirm Password *</label>
                <input className="form-control" type="password" value={form.confirm_password} onChange={e => set('confirm_password', e.target.value)} placeholder="••••••••" required />
              </div>
              <div className="alert alert-info" style={{ marginBottom: 14, fontSize: 12.5 }}>
                Your account will be provisioned with 3 demo models and your institution's OSFI E-23 inventory workspace.
              </div>
              <div style={{ display: 'flex', gap: 10 }}>
                <button type="button" className="btn btn-ghost" onClick={() => { setStep(1); setError(''); }}>← Back</button>
                <button type="submit" className="btn btn-primary" style={{ flex: 1, padding: '11px' }} disabled={saving}>
                  {saving ? <><Spinner /> Creating Account…</> : 'Create Account'}
                </button>
              </div>
            </div>
          )}
        </form>
        <div style={{ textAlign: 'center', marginTop: 18, fontSize: 12.5, color: 'var(--text-muted)' }}>
          Already have an account? <button style={{ background: 'none', border: 'none', color: 'var(--blue)', cursor: 'pointer', fontWeight: 600, fontSize: 12.5, padding: 0 }} onClick={onBack}>Sign in</button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════

function ExaminerExport() {
  const [loading, setLoading] = useState(false);
  const [generated, setGenerated] = useState(false);
  const toast = useToast();

  async function generate() {
    setLoading(true);
    try {
      const result = await apiFetch('/api/reports/examiner-export', { method: 'POST' });
      if (result instanceof Blob) {
        const url = URL.createObjectURL(result);
        const a = document.createElement('a');
        a.href = url;
        a.download = `ClearMRM-OSFI-Examiner-Export-${new Date().toISOString().slice(0, 10)}.pdf`;
        document.body.appendChild(a); a.click();
        document.body.removeChild(a); URL.revokeObjectURL(url);
        setGenerated(true);
        toast('OSFI Examiner Export downloaded', 'success');
      }
    } catch(e) { toast(e.message, 'error'); }
    finally { setLoading(false); }
  }

  const sections = [
    { num: 1, title: 'Complete Model Inventory', desc: 'All active models with tier, owner, validation status, and OSFI E-23 §3 classification.' },
    { num: 2, title: 'Tier 1 High-Risk Model Detail', desc: 'Per-model risk justification with AI reasoning and overdue validation flags per §4.2.' },
    { num: 3, title: 'Validation Evidence', desc: 'Full validation history including findings, outcomes, and conditions per §4.3.' },
    { num: 4, title: 'Third-Party Vendor Governance', desc: 'OSFI §5 compliance checklist and AI risk assessment for each vendor model.' },
    { num: 5, title: 'Management Attestation', desc: 'Formal signatory page with OSFI E-23 compliance declarations.' },
  ];

  return (
    <div>
      <div className="examiner-banner">
        <div>
          <div className="examiner-banner-title">🏛️ OSFI Examiner Export</div>
          <div className="examiner-banner-sub">
            A purpose-built Supervisory Review Package in the format OSFI examiners expect. Includes a 6-page structured PDF with AI-generated compliance narrative, complete model inventory, validation evidence, and vendor governance assessment — ready to submit in response to an OSFI examination request.
          </div>
        </div>
        <button className="btn btn-primary" style={{ fontSize: 15, padding: '13px 26px', whiteSpace: 'nowrap', flexShrink: 0 }} onClick={generate} disabled={loading}>
          {loading ? <><Spinner /> Generating PDF…</> : generated ? '↻ Regenerate Export' : '📤 Generate Examiner Export'}
        </button>
      </div>
      {generated && (
        <div className="alert alert-success" style={{ marginBottom: 18 }}>
          ✓ OSFI Examiner Export generated and downloaded. This export has been logged in the audit trail per OSFI E-23 §4.4.
        </div>
      )}
      <div style={{ marginBottom: 14, fontWeight: 700, color: 'var(--navy)' }}>What's included in the export:</div>
      <div className="examiner-sections">
        {sections.map(s => (
          <div key={s.num} className="examiner-section-card">
            <div className="examiner-section-num">{s.num}</div>
            <div className="examiner-section-info">
              <div className="examiner-section-title">{s.title}</div>
              <div className="examiner-section-desc">{s.desc}</div>
            </div>
          </div>
        ))}
        <div className="examiner-section-card" style={{ background: 'linear-gradient(135deg,#eff6ff,#f5f3ff)', border: '1px solid #bfdbfe' }}>
          <div className="examiner-section-num" style={{ background: 'linear-gradient(135deg,#1d4ed8,#7c3aed)' }}>AI</div>
          <div className="examiner-section-info">
            <div className="examiner-section-title">AI Compliance Narrative</div>
            <div className="examiner-section-desc">Claude Sonnet generates a 4-sentence examination narrative covering posture, governance, validation effectiveness, and key findings.</div>
          </div>
        </div>
      </div>
      <div className="card" style={{ maxWidth: 560 }}>
        <div style={{ fontWeight: 700, marginBottom: 10 }}>Important Notes</div>
        <ul style={{ paddingLeft: 18, fontSize: 13.5, lineHeight: 2, color: 'var(--text-muted)' }}>
          <li>Export is generated from live data — always generate immediately before submission</li>
          <li>The AI compliance narrative is explicitly labelled AI-generated in the document</li>
          <li>Each generation is logged as an immutable audit event per OSFI E-23 §4.4</li>
          <li>Data never leaves AWS ca-central-1 (PIPEDA / Canadian data residency)</li>
        </ul>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   ADMIN PANEL SCREEN
═══════════════════════════════════════════════════ */
function AdminPanel({ user }) {
  const [activeTab, setActiveTab] = useState('users');
  const [tenants, setTenants] = useState([]);
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showAddUser, setShowAddUser] = useState(false);
  const [ssoForm, setSsoForm] = useState({ sso_enabled: false, sso_provider_name: '', sso_metadata_url: '' });
  const [ssoSaving, setSsoSaving] = useState(false);
  const [addUserForm, setAddUserForm] = useState({ email: '', full_name: '', role: 'analyst', temp_password: '' });
  const [addUserSaving, setAddUserSaving] = useState(false);
  const toast = useToast();

  const tenantId = user?.tenant_id || '';

  async function loadData() {
    setLoading(true);
    try {
      const [t, u] = await Promise.all([
        apiFetch('/api/admin/tenants'),
        apiFetch(`/api/admin/tenants/${tenantId}/users`),
      ]);
      setTenants(t || []);
      setUsers(u || []);
      const myTenant = (t || []).find(x => x.id === tenantId);
      if (myTenant) setSsoForm({ sso_enabled: myTenant.sso_enabled || false, sso_provider_name: myTenant.sso_provider_name || '', sso_metadata_url: myTenant.sso_metadata_url || '' });
    } catch(e) { toast(e.message, 'error'); }
    finally { setLoading(false); }
  }
  useEffect(() => { loadData(); }, []);

  async function handleAddUser(e) {
    e.preventDefault(); setAddUserSaving(true);
    try {
      await apiFetch(`/api/admin/tenants/${tenantId}/users`, { method: 'POST', body: JSON.stringify(addUserForm) });
      toast('User provisioned successfully', 'success');
      setShowAddUser(false);
      setAddUserForm({ email: '', full_name: '', role: 'analyst', temp_password: '' });
      loadData();
    } catch(e) { toast(e.message, 'error'); }
    finally { setAddUserSaving(false); }
  }

  async function saveSSO(e) {
    e.preventDefault(); setSsoSaving(true);
    try {
      await apiFetch(`/api/admin/tenants/${tenantId}/sso`, { method: 'PUT', body: JSON.stringify(ssoForm) });
      toast('SSO configuration saved', 'success');
      loadData();
    } catch(e) { toast(e.message, 'error'); }
    finally { setSsoSaving(false); }
  }

  if (loading) return <div className="spinner-center"><Spinner dark size={28} /></div>;

  return (
    <div>
      <div className="admin-tabs">
        {[['users', 'User Management'], ['sso', 'SSO Configuration'], ['tenants', 'All Tenants']].map(([k, l]) => (
          <button key={k} className={`admin-tab${activeTab === k ? ' active' : ''}`} onClick={() => setActiveTab(k)}>{l}</button>
        ))}
      </div>

      {activeTab === 'users' && (
        <div>
          <div className="section-hdr">
            <div className="section-title">Users in This Tenant</div>
            <button className="btn btn-primary" onClick={() => setShowAddUser(true)}>+ Provision User</button>
          </div>
          <div className="card" style={{ marginBottom: 18 }}>
            <div className="table-wrap">
              <table>
                <thead><tr><th>Email</th><th>Name</th><th>Role</th><th>Added</th></tr></thead>
                <tbody>
                  {users.map(u => (
                    <tr key={u.id}>
                      <td>{u.email}</td>
                      <td>{u.full_name || '—'}</td>
                      <td><span className="badge badge-blue">{u.role}</span></td>
                      <td style={{ fontSize: 12, color: 'var(--text-muted)' }}>{new Date(u.created_at).toLocaleDateString('en-CA')}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
          {showAddUser && (
            <div className="card" style={{ maxWidth: 500 }}>
              <div style={{ fontWeight: 700, marginBottom: 14, fontSize: 15 }}>Provision New User</div>
              <form onSubmit={handleAddUser}>
                <div className="form-grid">
                  <div className="form-group"><label className="form-label">Email *</label><input className="form-control" type="email" value={addUserForm.email} onChange={e => setAddUserForm(p => ({ ...p, email: e.target.value }))} required /></div>
                  <div className="form-group"><label className="form-label">Full Name</label><input className="form-control" value={addUserForm.full_name} onChange={e => setAddUserForm(p => ({ ...p, full_name: e.target.value }))} /></div>
                  <div className="form-group"><label className="form-label">Role</label>
                    <select className="form-control" value={addUserForm.role} onChange={e => setAddUserForm(p => ({ ...p, role: e.target.value }))}>
                      <option value="analyst">Analyst</option>
                      <option value="validator">Validator</option>
                      <option value="admin">Admin</option>
                    </select>
                  </div>
                  <div className="form-group"><label className="form-label">Temporary Password *</label><input className="form-control" type="password" value={addUserForm.temp_password} onChange={e => setAddUserForm(p => ({ ...p, temp_password: e.target.value }))} placeholder="Min 8 chars, uppercase, number, special" required /></div>
                </div>
                <div style={{ display: 'flex', gap: 10, marginTop: 14 }}>
                  <button type="button" className="btn btn-ghost" onClick={() => setShowAddUser(false)}>Cancel</button>
                  <button type="submit" className="btn btn-primary" disabled={addUserSaving}>
                    {addUserSaving ? <><Spinner /> Provisioning…</> : 'Provision User'}
                  </button>
                </div>
              </form>
            </div>
          )}
        </div>
      )}

      {activeTab === 'sso' && (
        <div>
          <div className="section-title" style={{ marginBottom: 16 }}>SSO Configuration (SAML 2.0 / Azure AD)</div>
          <div className="card sso-config-form">
            <div className="alert alert-info" style={{ marginBottom: 18, fontSize: 13 }}>
              SSO allows your users to authenticate via your institution's identity provider (Azure AD, Okta, PingFederate). After saving, your IdP administrator must register ClearMRM as a SAML service provider.
            </div>
            <form onSubmit={saveSSO}>
              <div className="sso-toggle-row">
                <button type="button" className={`toggle${ssoForm.sso_enabled ? ' on' : ''}`} onClick={() => setSsoForm(p => ({ ...p, sso_enabled: !p.sso_enabled }))} />
                <div>
                  <div style={{ fontWeight: 600, fontSize: 14 }}>Enable SSO for this tenant</div>
                  <div style={{ fontSize: 12, color: 'var(--text-muted)' }}>Users from your domain will see a "Sign in with SSO" option</div>
                </div>
              </div>
              {ssoForm.sso_enabled && (
                <>
                  <div className="form-group" style={{ marginBottom: 14 }}>
                    <label className="form-label">Identity Provider Name *</label>
                    <input className="form-control" value={ssoForm.sso_provider_name} onChange={e => setSsoForm(p => ({ ...p, sso_provider_name: e.target.value }))} placeholder="e.g. AzureAD-YourInstitution" required={ssoForm.sso_enabled} />
                    <div style={{ fontSize: 11.5, color: 'var(--text-muted)', marginTop: 4 }}>Alphanumeric + hyphens only. Must match the provider name registered in AWS Cognito.</div>
                  </div>
                  <div className="form-group" style={{ marginBottom: 18 }}>
                    <label className="form-label">SAML Metadata URL *</label>
                    <input className="form-control" value={ssoForm.sso_metadata_url} onChange={e => setSsoForm(p => ({ ...p, sso_metadata_url: e.target.value }))} placeholder="https://login.microsoftonline.com/{tenant}/federationmetadata/2007-06/federationmetadata.xml" required={ssoForm.sso_enabled} />
                    <div style={{ fontSize: 11.5, color: 'var(--text-muted)', marginTop: 4 }}>Azure AD: Settings → Single Sign-On → Metadata URL. Okta: Identity Provider metadata URL.</div>
                  </div>
                  <div className="card" style={{ background: 'var(--bg)', marginBottom: 18 }}>
                    <div style={{ fontWeight: 700, marginBottom: 8, fontSize: 13 }}>Configure your IdP with these ClearMRM SAML values:</div>
                    <div style={{ fontSize: 12.5, lineHeight: 2.2, fontFamily: 'monospace', color: 'var(--text)' }}>
                      <div><strong>Entity ID (Audience URI):</strong> urn:amazon:cognito:sp:ca-central-1_72aIikL9T</div>
                      <div><strong>ACS URL (Reply URL):</strong> https://clearmrm.auth.ca-central-1.amazoncognito.com/saml2/idpresponse</div>
                      <div><strong>Attribute Mapping (email):</strong> http://schemas.xmlsoap.org/ws/2005/05/identity/claims/emailaddress</div>
                    </div>
                  </div>
                </>
              )}
              <button type="submit" className="btn btn-primary" disabled={ssoSaving}>
                {ssoSaving ? <><Spinner /> Saving…</> : 'Save SSO Configuration'}
              </button>
            </form>
          </div>
        </div>
      )}

      {activeTab === 'tenants' && (
        <div>
          <div className="section-title" style={{ marginBottom: 16 }}>All Tenants ({tenants.length})</div>
          <div className="card">
            <div className="table-wrap">
              <table>
                <thead><tr><th>Institution</th><th>Type</th><th>Domain</th><th>Users</th><th>Models</th><th>SSO</th><th>Status</th></tr></thead>
                <tbody>
                  {tenants.map(t => (
                    <tr key={t.id}>
                      <td><strong>{t.name}</strong></td>
                      <td style={{ fontSize: 12 }}>{(t.institution_type || '—').replace(/_/g, ' ')}</td>
                      <td style={{ fontSize: 12, color: 'var(--text-muted)' }}>{t.domain || '—'}</td>
                      <td>{t.user_count || 0}</td>
                      <td>{t.model_count || 0}</td>
                      <td>{t.sso_enabled ? <span className="badge badge-green">SSO</span> : '—'}</td>
                      <td><span className={`badge badge-${t.status === 'active' ? 'green' : 'grey'}`}>{t.status || 'active'}</span></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   EXAM SPRINT MODE
═══════════════════════════════════════════════════ */
function ExamSprintMode() {
  const [sprint, setSprint]   = useState(undefined);
  const [loading, setLoading] = useState(true);
  const [launching, setLaunching] = useState(false);
  const [tab, setTab]         = useState('gaps');
  const toast = useToast();

  useEffect(() => {
    apiFetch('/api/exam-sprint/latest')
      .then(setSprint).catch(() => setSprint(null)).finally(() => setLoading(false));
  }, []);

  async function launch() {
    setLaunching(true);
    try {
      const r = await apiFetch('/api/exam-sprint/launch',{ method:'POST' });
      setSprint(r);
      setTab('gaps');
      toast('Exam sprint launched — AI gap analysis complete','success');
    } catch(e) { toast(e.message,'error'); }
    finally { setLaunching(false); }
  }

  function reLaunch() {
    if (!confirm('Launch a fresh AI gap analysis? This will replace the current sprint plan.')) return;
    setSprint(null);
    launch();
  }

  const scoreClass = s => s >= 75 ? 'rc-low' : s >= 50 ? 'rc-med' : 'rc-high';
  const chipClass  = l => l === 'high' ? 'rchip-high' : l === 'medium' ? 'rchip-medium' : 'rchip-low';
  const sevCard    = s => s === 'critical' ? 'sev-critical' : s === 'high' ? 'sev-high' : 'sev-medium';
  const sevBadge   = s => s === 'critical' ? 'gsev-critical' : s === 'high' ? 'gsev-high' : 'gsev-medium';

  if (loading) return <div className="spinner-center"><Spinner dark size={28} /></div>;

  return (
    <div>
      <div className="sprint-hero">
        <div style={{ flex:1 }}>
          <div className="sprint-hero-title">🚨 OSFI Exam Sprint Mode</div>
          <div className="sprint-hero-sub">
            AI-powered Emergency Examination Readiness. Full compliance gap analysis against OSFI E-23 with a prioritized 30/60/90-day action plan.
          </div>
          {sprint && (
            <div style={{ marginTop:14, display:'flex', gap:10, flexWrap:'wrap', alignItems:'center' }}>
              <span style={{ fontSize:12, opacity:0.8 }}>Last analysis: {new Date(sprint.created_at).toLocaleDateString('en-CA')}</span>
              <span className={`risk-chip ${chipClass(sprint.exam_risk_level)}`}>{(sprint.exam_risk_level||'').toUpperCase()} EXAM RISK</span>
              <button className="btn btn-sm" style={{ background:'rgba(255,255,255,0.18)', color:'#fff', border:'1px solid rgba(255,255,255,0.3)' }} onClick={reLaunch} disabled={launching}>
                {launching ? <><Spinner /> Analysing…</> : '↻ Refresh Analysis'}
              </button>
            </div>
          )}
          {!sprint && (
            <button className="btn btn-lg" style={{ marginTop:16, background:'#fff', color:'var(--red)', fontWeight:800 }} onClick={launch} disabled={launching}>
              {launching ? <><Spinner dark size={16} /> Running AI Gap Analysis…</> : '⚡ Launch Exam Sprint'}
            </button>
          )}
        </div>
        {sprint && (
          <div className={`readiness-circle ${scoreClass(sprint.overall_readiness_score)}`}>
            <div className="readiness-num">{sprint.overall_readiness_score}</div>
            <div className="readiness-lbl">Readiness</div>
          </div>
        )}
      </div>

      {!sprint && !launching && (
        <div className="card">
          <div className="section-title" style={{ marginBottom:14 }}>What Exam Sprint Covers</div>
          {[
            ['🔍','Compliance Gap Analysis','Scans your model inventory, validation records, and vendor assessments against every OSFI E-23 requirement with specific §section references.'],
            ['📅','30/60/90-Day Sprint Plan','Prioritized action plan by urgency — P1 actions for immediate resolution, P2 for medium-term — with assigned owners and OSFI references.'],
            ['❓','Examiner Question Prep','Predicts the questions an OSFI examiner is most likely to ask based on your current posture, so your team can prepare responses in advance.'],
            ['⚡','Quick Wins','Actions you can complete today or this week to immediately improve your readiness before the full remediation plan is underway.'],
          ].map(([icon,t,d]) => (
            <div key={t} className="sprint-feature-row">
              <span style={{ fontSize:22, flex:'0 0 30px' }}>{icon}</span>
              <div><div style={{ fontWeight:700, marginBottom:4 }}>{t}</div><div style={{ fontSize:13, color:'var(--text-muted)' }}>{d}</div></div>
            </div>
          ))}
        </div>
      )}

      {sprint && (
        <>
          <div className="card" style={{ marginBottom:16 }}>
            <div style={{ fontWeight:700, marginBottom:8, fontSize:14 }}>Executive Summary</div>
            <div style={{ fontSize:13.5, lineHeight:1.65 }}>{sprint.executive_summary}</div>
          </div>

          <div className="admin-tabs" style={{ marginBottom:16 }}>
            {[['gaps','Critical Gaps'],['plan','Sprint Plan'],['prep','Exam Prep']].map(([k,l]) => (
              <button key={k} className={`admin-tab${tab===k?' active':''}`} onClick={() => setTab(k)}>{l}</button>
            ))}
          </div>

          {tab === 'gaps' && (
            <>
              {(sprint.critical_gaps||[]).length > 0 ? (
                <div className="gap-grid">
                  {sprint.critical_gaps.map((g,i) => (
                    <div key={i} className={`gap-card ${sevCard(g.severity)}`}>
                      <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:8 }}>
                        <span className={`gap-sev ${sevBadge(g.severity)}`}>{g.severity}</span>
                        <span style={{ fontSize:11.5, color:'var(--text-muted)', fontWeight:700 }}>{g.osfi_section}</span>
                        {g.affected_count > 0 && <span style={{ marginLeft:'auto', fontSize:11.5, color:'var(--text-muted)' }}>{g.affected_count} model{g.affected_count!==1?'s':''}</span>}
                      </div>
                      <div style={{ fontSize:13 }}>{g.gap}</div>
                    </div>
                  ))}
                </div>
              ) : (
                <div className="card"><div style={{ fontSize:13, color:'var(--text-muted)' }}>No critical gaps identified. Your compliance posture is strong.</div></div>
              )}
              {(sprint.strengths||[]).length > 0 && (
                <div className="card">
                  <div className="section-title" style={{ marginBottom:12 }}>Compliance Strengths</div>
                  <div className="strengths-list">
                    {sprint.strengths.map((s,i) => <span key={i} className="strength-chip">{s}</span>)}
                  </div>
                </div>
              )}
            </>
          )}

          {tab === 'plan' && (
            <div className="sprint-cols">
              {[['day_30','Day 30','shdr-30'],['day_60','Day 60','shdr-60'],['day_90','Day 90','shdr-90']].map(([key,label,cls]) => (
                <div key={key} className="sprint-col">
                  <div className={`sprint-col-hdr ${cls}`}>{label} Actions</div>
                  <div className="sprint-col-body">
                    {((sprint.sprint_plan||{})[key]||[]).length === 0 && (
                      <div style={{ fontSize:12, color:'var(--text-muted)', padding:'4px 0' }}>No actions for this period.</div>
                    )}
                    {((sprint.sprint_plan||{})[key]||[]).map((a,i) => (
                      <div key={i} className="sprint-action">
                        <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:4 }}>
                          <span className={`ap-badge ${a.priority==='P1'?'ap-p1':'ap-p2'}`}>{a.priority}</span>
                          <span style={{ fontSize:10.5, color:'var(--text-muted)', fontWeight:700 }}>{a.osfi_ref}</span>
                        </div>
                        <div style={{ fontSize:12.5, fontWeight:500, marginBottom:3 }}>{a.action}</div>
                        {a.owner && <div style={{ fontSize:11.5, color:'var(--text-muted)' }}>Owner: {a.owner}</div>}
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          )}

          {tab === 'prep' && (
            <>
              {(sprint.quick_wins||[]).length > 0 && (
                <div className="card" style={{ marginBottom:16 }}>
                  <div className="section-title" style={{ marginBottom:12 }}>Quick Wins (Do Today)</div>
                  <ul className="qw-list">{sprint.quick_wins.map((w,i) => <li key={i}>{w}</li>)}</ul>
                </div>
              )}
              {(sprint.examiner_likely_questions||[]).length > 0 && (
                <div className="card">
                  <div className="section-title" style={{ marginBottom:12 }}>Likely Examiner Questions</div>
                  <ul className="eq-list">{sprint.examiner_likely_questions.map((q,i) => <li key={i}>{q}</li>)}</ul>
                </div>
              )}
            </>
          )}
        </>
      )}
    </div>
  );
}

function AppShell({ user: userProp }) {
  const [user, setUser]                   = useState(userProp);
  const [screen, setScreen]               = useState('dashboard');
  const [detailModelId, setDetailModelId] = useState(null);
  const [editModelId, setEditModelId]     = useState(null);
  const [rateModelId, setRateModelId]     = useState(null);

  // Fetch full user profile (needed for tenant_id in AdminPanel)
  useEffect(() => {
    apiFetch('/api/me').then(d => {
      if (d && d.user) setUser(prev => ({ ...prev, ...d.user, tenant_name: (d.tenant && d.tenant.name) || prev.tenant_name }));
    }).catch(() => {});
  }, []);

  function renderScreen() {
    switch (screen) {
      case 'dashboard':    return <Dashboard setScreen={setScreen} setDetailModelId={setDetailModelId} />;
      case 'models':       return <ModelInventory setScreen={setScreen} setDetailModelId={setDetailModelId} setEditModelId={setEditModelId} />;
      case 'model_form':   return <ModelForm modelId={editModelId} setScreen={setScreen} setDetailModelId={setDetailModelId} />;
      case 'model_detail': return <ModelDetail modelId={detailModelId} setScreen={setScreen} setEditModelId={setEditModelId} setRateModelId={setRateModelId} />;
      case 'rate_wizard':  return <RatingWizard modelId={rateModelId} setScreen={setScreen} setDetailModelId={setDetailModelId} />;
      case 'validations':     return <Validations />;
      case 'vendors':         return <VendorAssessments />;
      case 'audit':           return <AuditTrail />;
      case 'board':           return <BoardReport />;
      case 'examiner_export': return <ExaminerExport />;
      case 'exam_sprint':     return <ExamSprintMode />;
      case 'import':          return <CsvImport />;
      case 'admin':           return <AdminPanel user={user} />;
      default:                return <Dashboard setScreen={setScreen} setDetailModelId={setDetailModelId} />;
    }
  }

  return (
    <div className="app-shell">
      <Sidebar screen={screen} setScreen={setScreen} user={user} />
      <div className="main">
        <div className="topbar">
          <div className="topbar-title">{SCREEN_TITLES[screen] || 'ClearMRM'}</div>
          <div className="topbar-meta">OSFI E-23 · {new Date().toLocaleDateString('en-CA')}</div>
        </div>
        <div className="content">{renderScreen()}</div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════════ */
function parseJwtPayload(token) {
  try {
    return JSON.parse(atob(token.split('.')[1]));
  } catch { return {}; }
}

function App() {
  const [user, setUser] = useState(() => {
    // Handle SSO callback: token or error in URL hash
    const hash = window.location.hash;
    if (hash.includes('sso-token=')) {
      const token = hash.split('sso-token=')[1];
      storeToken(token);
      window.history.replaceState(null, '', window.location.pathname);
      const p = parseJwtPayload(token);
      return { email: p.email || p.sub || '', tenant_name: p.tenant_name || p.tenant || 'ClearMRM' };
    }
    if (hash.includes('sso-error=')) {
      const err = decodeURIComponent(hash.split('sso-error=')[1]);
      window.history.replaceState(null, '', window.location.pathname);
      // Will show error via toast after mount — store in sessionStorage for display
      sessionStorage.setItem('sso_error', err);
    }
    const token = getToken();
    if (!token) return null;
    const p = parseJwtPayload(token);
    return { email: p.email || p.sub || '', tenant_name: p.tenant_name || p.tenant || 'ClearMRM' };
  });
  const [showOnboarding, setShowOnboarding] = useState(false);

  useEffect(() => {
    const ssoErr = sessionStorage.getItem('sso_error');
    if (ssoErr) {
      sessionStorage.removeItem('sso_error');
      // Toast won't be available until rendered — show alert fallback
      alert('SSO sign-in failed: ' + ssoErr);
    }
  }, []);

  function handleLogin(data) {
    const p = parseJwtPayload(data.token);
    setUser({ email: p.email || p.sub || '', tenant_name: p.tenant_name || p.tenant || 'ClearMRM' });
  }

  if (showOnboarding) return <ToastProvider><OnboardingScreen onBack={() => setShowOnboarding(false)} /></ToastProvider>;

  return (
    <ToastProvider>
      {user ? <AppShell user={user} /> : <LoginScreen onLogin={handleLogin} showOnboarding={showOnboarding} setShowOnboarding={setShowOnboarding} />}
    </ToastProvider>
  );
}

const rootEl = document.getElementById('root');
ReactDOM.createRoot(rootEl).render(<App />);
</script>
</body>
