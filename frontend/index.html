        </div>
      )}
    </Modal>
  );
}

/* ═══════════════════════════════════════════════════
   VENDOR ASSESSMENTS
═══════════════════════════════════════════════════ */
const VENDOR_CHECKS = [
  { key: 'sla_documented',        label: 'SLA is formally documented' },
  { key: 'data_access_documented',label: 'Data access and usage rights are documented' },
  { key: 'audit_rights',          label: 'Contractual audit rights over the vendor exist' },
  { key: 'exit_plan',             label: 'Exit / transition plan is documented' },
  { key: 'concentration_risk',    label: 'Concentration risk has been assessed' },
  { key: 'model_documentation',   label: 'Model documentation (methodology, assumptions) received from vendor' },
  { key: 'override_capability',   label: 'Override capability exists (we can override model outputs)' },
];

function VendorAssessments() {
  const [list, setList]     = useState([]);
  const [models, setModels] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showCreate, setShowCreate] = useState(false);
  const [selected, setSelected]     = useState(null);
  const toast = useToast();

  function load() {
    setLoading(true);
    Promise.all([apiFetch('/api/vendor-assessments'), apiFetch('/api/models')])
      .then(([a, m]) => { setList(a || []); setModels((m || []).filter(x => x.is_third_party)); })
      .catch(e => toast(e.message, 'error'))
      .finally(() => setLoading(false));
  }
  useEffect(() => { load(); }, []);

  return (
    <div>
      <div className="section-hdr">
        <div className="section-title">Vendor Assessments</div>
        <button className="btn btn-primary" onClick={() => setShowCreate(true)}>+ New Assessment</button>
      </div>
      <div className="card">
        {loading ? (
          <div className="spinner-center"><Spinner dark size={26} /></div>
        ) : list.length === 0 ? (
          <div className="empty-state"><div className="empty-icon">🏢</div>No vendor assessments yet.</div>
        ) : (
          <div className="table-wrap">
            <table>
              <thead><tr><th>Model</th><th>Vendor</th><th>Risk Level</th><th>Assessed By</th><th>Next Review</th></tr></thead>
              <tbody>
                {list.map(a => (
                  <tr key={a.id} style={{ cursor: 'pointer' }} onClick={() => setSelected(a)}>
                    <td><strong>{a.model_name}</strong></td>
                    <td>{a.vendor_name}</td>
                    <td><StatusBadge status={a.risk_level} /></td>
                    <td>{a.assessed_by}</td>
                    <td style={{ fontSize: 13 }}>{a.next_review_due || '—'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
      {showCreate && <CreateVendorModal models={models} onClose={() => setShowCreate(false)} onCreated={() => { setShowCreate(false); load(); }} />}
      {selected && <VendorDetailModal a={selected} onClose={() => setSelected(null)} />}
    </div>
  );
}

function CreateVendorModal({ models, onClose, onCreated }) {
  const initChecks = Object.fromEntries(VENDOR_CHECKS.map(c => [c.key, false]));
  const [checks, setChecks] = useState(initChecks);
  const [form, setForm]     = useState({ model_id: '', findings: '' });
  const [saving, setSaving] = useState(false);
  const [aiResult, setAiResult] = useState(null);
  const toast = useToast();

  async function handleSubmit(e) {
    e.preventDefault(); setSaving(true);
    try {
      const r = await apiFetch('/api/vendor-assessments', { method: 'POST', body: JSON.stringify({ ...form, ...checks }) });
      if (r?.ai_assessment) { setAiResult(r.ai_assessment); }
      else { toast('Assessment created', 'success'); onCreated(); }
    } catch (e) { toast(e.message, 'error'); setSaving(false); }
  }

  if (aiResult) return (
    <Modal title="Assessment Created" onClose={onCreated} footer={<button className="btn btn-primary" onClick={onCreated}>Done</button>}>
      <div className="alert alert-success">Vendor assessment submitted successfully.</div>
      <div className="ai-panel">
        <div className="ai-panel-hdr"><span className="ai-icon">🧠</span>AI Vendor Risk Assessment</div>
        <div className="ai-insight">{aiResult}</div>
      </div>
    </Modal>
  );

  return (
    <Modal title="New Vendor Assessment" onClose={onClose}
      footer={
        <>
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" form="va-form" type="submit" disabled={saving}>
            {saving ? <><Spinner /> Submitting…</> : 'Submit Assessment'}
          </button>
        </>
      }>
      <form id="va-form" onSubmit={handleSubmit}>
        <div className="form-group" style={{ marginBottom: 16 }}>
          <label className="form-label">Model *</label>
          <select className="form-control" value={form.model_id} onChange={e => setForm(p => ({ ...p, model_id: e.target.value }))} required>
            <option value="">Select a model…</option>
            {models.map(m => <option key={m.id} value={m.id}>{m.name} — {m.vendor_name}</option>)}
          </select>
          <div style={{ fontSize: 11.5, color: 'var(--text-muted)', marginTop: 4 }}>Only vendor/third-party models are shown.</div>
        </div>
        <div style={{ marginBottom: 16 }}>
          <div className="form-label" style={{ marginBottom: 8 }}>Due Diligence Checklist</div>
          <div className="vendor-cb-list">
            {VENDOR_CHECKS.map(c => (
              <div key={c.key} className="vendor-cb">
                <input type="checkbox" id={c.key} checked={!!checks[c.key]} onChange={e => setChecks(p => ({ ...p, [c.key]: e.target.checked }))} />
                <label htmlFor={c.key}>{c.label}</label>
              </div>
            ))}
          </div>
        </div>
        <div className="form-group">
          <label className="form-label">Findings</label>
          <textarea className="form-control" rows={4} value={form.findings} onChange={e => setForm(p => ({ ...p, findings: e.target.value }))} placeholder="Summarise your assessment findings and observations…" />
        </div>
      </form>
    </Modal>
  );
}

function VendorDetailModal({ a, onClose }) {
  return (
    <Modal title="Vendor Assessment Detail" onClose={onClose} footer={<button className="btn btn-ghost" onClick={onClose}>Close</button>}>
      <div className="detail-grid">
        {[
          ['Model',       a.model_name],
          ['Vendor',      a.vendor_name],
          ['Assessed By', a.assessed_by],
          ['Next Review', a.next_review_due || '—'],
        ].map(([l, v]) => (
          <div key={l} className="detail-item"><div className="dl">{l}</div><div className="dv">{v}</div></div>
        ))}
        <div className="detail-item"><div className="dl">Risk Level</div><div className="dv"><StatusBadge status={a.risk_level} /></div></div>
      </div>
      <div style={{ marginBottom: 14 }}>
        <div className="dl" style={{ marginBottom: 8 }}>Due Diligence Checklist</div>
        <div className="vendor-cb-list">
          {VENDOR_CHECKS.map(c => (
            <div key={c.key} className="vendor-cb">
              <span style={{ fontSize: 15 }}>{a[c.key] ? '✅' : '❌'}</span>
              <label style={{ color: a[c.key] ? 'var(--text)' : 'var(--grey)' }}>{c.label}</label>
            </div>
          ))}
        </div>
      </div>
      {a.findings && (
        <div style={{ marginBottom: 14 }}>
          <div className="dl">Findings</div>
          <div style={{ fontSize: 13, marginTop: 4, whiteSpace: 'pre-wrap' }}>{a.findings}</div>
        </div>
      )}
      {a.ai_assessment && (
        <div className="ai-panel">
          <div className="ai-panel-hdr"><span className="ai-icon">🧠</span>AI Risk Assessment</div>
          <div className="ai-insight">{a.ai_assessment}</div>
        </div>
      )}
    </Modal>
  );
}

/* ═══════════════════════════════════════════════════
   AUDIT TRAIL
═══════════════════════════════════════════════════ */
function AuditTrail() {
  const [events, setEvents] = useState([]);
  const [loading, setLoading] = useState(true);
  const toast = useToast();

  useEffect(() => {
    apiFetch('/api/audit')
      .then(setEvents)
      .catch(e => toast(e.message, 'error'))
      .finally(() => setLoading(false));
  }, []);

  return (
    <div>
      <div className="section-title" style={{ marginBottom: 16 }}>Audit Trail</div>
      <div className="card">
        {loading ? (
          <div className="spinner-center"><Spinner dark size={26} /></div>
        ) : events.length === 0 ? (
          <div className="empty-state"><div className="empty-icon">📋</div>No audit events recorded yet.</div>
        ) : (
          events.map((e, i) => (
            <div key={i} className="audit-row">
              <div className="audit-ts">{e.created_at || e.timestamp}</div>
              <div className="audit-desc">
                {e.description || e.action}
                {e.model_name && <div style={{ fontSize: 12, color: 'var(--text-muted)', marginTop: 2 }}>Model: {e.model_name}</div>}
              </div>
              <div className="audit-user">{e.performed_by || e.user_email || ''}</div>
            </div>
          ))
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   BOARD REPORT
═══════════════════════════════════════════════════ */
function BoardReport() {
  const [loading, setLoading] = useState(false);
  const toast = useToast();

  async function downloadReport() {
    setLoading(true);
    try {
      const result = await apiFetch('/api/reports/board-pack', { method: 'POST' });
      if (result instanceof Blob) {
        const url = URL.createObjectURL(result);
        const a = document.createElement('a');
        a.href = url;
        a.download = `ClearMRM_BoardPack_${new Date().toISOString().slice(0, 10)}.pdf`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        toast('Board pack downloaded', 'success');
      } else {
        toast('Board pack generated successfully', 'success');
      }
    } catch (e) { toast(e.message, 'error'); }
    finally { setLoading(false); }
  }

  return (
    <div>
      <div className="section-title" style={{ marginBottom: 16 }}>Board Report</div>
      <div className="card" style={{ maxWidth: 580 }}>
        <p style={{ fontSize: 14, color: 'var(--text-muted)', lineHeight: 1.7, marginBottom: 14 }}>
          Generate the OSFI E-23 Board Pack — a comprehensive PDF report including model inventory summary,
          risk tier breakdown, validation status, overdue items, vendor assessment summary, and an
          AI-generated executive summary suitable for board-level review.
        </p>
        <div className="alert alert-info">
          This report includes an AI-generated executive summary with key compliance observations,
          risk concentration analysis, and recommendations per OSFI E-23 guidance.
        </div>
        <button className="btn btn-primary" onClick={downloadReport} disabled={loading} style={{ fontSize: 15, padding: '12px 24px', marginTop: 4 }}>
          {loading ? <><Spinner /> Generating PDF…</> : '📑 Download Board Pack'}
        </button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   CSV IMPORT
═══════════════════════════════════════════════════ */
function CsvImport() {
  const [file, setFile]   = useState(null);
  const [drag, setDrag]   = useState(false);
  const [loading, setLoading] = useState(false);
  const [result, setResult]   = useState(null);
  const fileRef = useRef();
  const toast = useToast();

  function handleFile(f) {
    if (!f) return;
    if (!f.name.toLowerCase().endsWith('.csv')) { toast('Please select a .csv file', 'error'); return; }
    setFile(f); setResult(null);
  }

  async function handleUpload() {
    if (!file) return;
    setLoading(true);
    try {
      const fd = new FormData();
      fd.append('file', file);
      const token = getToken();
      const res = await fetch('/api/models/import-csv', {
        method: 'POST',
        headers: { ...(token ? { Authorization: `Bearer ${token}` } : {}) },
        body: fd,
      });
      if (res.status === 401 || res.status === 403) { clearToken(); window.location.reload(); return; }
      if (!res.ok) { const e = await res.json().catch(() => ({ message: `HTTP ${res.status}` })); throw new Error(e.message); }
      const r = await res.json();
      setResult(r);
      setFile(null);
      toast(`Imported ${r.imported} model(s)`, 'success');
    } catch (e) { toast(e.message, 'error'); }
    finally { setLoading(false); }
  }

  return (
    <div>
      <div className="section-title" style={{ marginBottom: 16 }}>Import Models from CSV</div>
      <div className="card" style={{ maxWidth: 560 }}>
        <div
          className={`import-zone${drag ? ' drag-over' : ''}`}
          onClick={() => fileRef.current.click()}
          onDragOver={e => { e.preventDefault(); setDrag(true); }}
          onDragLeave={() => setDrag(false)}
          onDrop={e => { e.preventDefault(); setDrag(false); handleFile(e.dataTransfer.files[0]); }}>
          <div className="import-icon">📥</div>
          <div style={{ fontWeight: 600, fontSize: 15 }}>
            {file ? file.name : 'Drop a CSV file here, or click to browse'}
          </div>
          <div className="import-hint">
            Supported columns: name, version, business_unit, model_owner_name, methodology_type, is_third_party, vendor_name
          </div>
          <input ref={fileRef} type="file" accept=".csv" style={{ display: 'none' }} onChange={e => handleFile(e.target.files[0])} />
        </div>
        {file && (
          <div style={{ marginTop: 14 }}>
            <button className="btn btn-primary" onClick={handleUpload} disabled={loading}>
              {loading ? <><Spinner /> Importing…</> : `Import ${file.name}`}
            </button>
          </div>
        )}
        {result && (
          <div style={{ marginTop: 16 }}>
            <div className="alert alert-success">✓ Imported <strong>{result.imported}</strong> model(s) successfully.</div>
            {result.skipped > 0 && <div className="alert alert-warning">⚠️ {result.skipped} row(s) skipped (duplicates or invalid data).</div>}
            {result.errors?.length > 0 && (
              <div className="alert alert-danger">
                <strong>Errors encountered:</strong>
                <ul style={{ marginTop: 6, paddingLeft: 16 }}>
                  {result.errors.map((err, i) => <li key={i} style={{ fontSize: 13 }}>{err}</li>)}
                </ul>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   APP SHELL
═══════════════════════════════════════════════════ */
const SCREEN_TITLES = {
  dashboard:    'Dashboard',
  models:       'Model Inventory',
  model_form:   'Model Form',
  model_detail: 'Model Detail',
  rate_wizard:  'Risk Rating Wizard',
  validations:  'Validations',
  vendors:      'Vendor Assessments',
  audit:        'Audit Trail',
  board:        'Board Report',
  import:       'Import CSV',
};

function AppShell({ user }) {
  const [screen, setScreen]             = useState('dashboard');
  const [detailModelId, setDetailModelId] = useState(null);
  const [editModelId, setEditModelId]   = useState(null);
  const [rateModelId, setRateModelId]   = useState(null);

  function renderScreen() {
    switch (screen) {
      case 'dashboard':    return <Dashboard setScreen={setScreen} setDetailModelId={setDetailModelId} />;
      case 'models':       return <ModelInventory setScreen={setScreen} setDetailModelId={setDetailModelId} setEditModelId={setEditModelId} />;
      case 'model_form':   return <ModelForm modelId={editModelId} setScreen={setScreen} setDetailModelId={setDetailModelId} />;
      case 'model_detail': return <ModelDetail modelId={detailModelId} setScreen={setScreen} setEditModelId={setEditModelId} setRateModelId={setRateModelId} />;
      case 'rate_wizard':  return <RatingWizard modelId={rateModelId} setScreen={setScreen} setDetailModelId={setDetailModelId} />;
      case 'validations':  return <Validations />;
      case 'vendors':      return <VendorAssessments />;
      case 'audit':        return <AuditTrail />;
      case 'board':        return <BoardReport />;
      case 'import':       return <CsvImport />;
      default:             return <Dashboard setScreen={setScreen} setDetailModelId={setDetailModelId} />;
    }
  }

  return (
    <div className="app-shell">
      <Sidebar screen={screen} setScreen={setScreen} user={user} />
      <div className="main">
        <div className="topbar">
          <div className="topbar-title">{SCREEN_TITLES[screen] || 'ClearMRM'}</div>
          <div className="topbar-meta">OSFI E-23 · {new Date().toLocaleDateString('en-CA')}</div>
        </div>
        <div className="content">{renderScreen()}</div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════════ */
function parseJwtPayload(token) {
  try {
    return JSON.parse(atob(token.split('.')[1]));
  } catch { return {}; }
}

function App() {
  const [user, setUser] = useState(() => {
    const token = getToken();
    if (!token) return null;
    const p = parseJwtPayload(token);
    return { email: p.email || p.sub || '', tenant_name: p.tenant_name || p.tenant || 'ClearMRM' };
  });

  function handleLogin(data) {
    const p = parseJwtPayload(data.token);
    setUser({ email: p.email || p.sub || '', tenant_name: p.tenant_name || p.tenant || 'ClearMRM' });
  }

  return (
    <ToastProvider>
      {user ? <AppShell user={user} /> : <LoginScreen onLogin={handleLogin} />}
    </ToastProvider>
  );
}

const rootEl = document.getElementById('root');
ReactDOM.createRoot(rootEl).render(<App />);
</script>
